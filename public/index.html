    <div class="field"><label>Details / Notes</label><textarea id="ctNote" rows="2" style="width:100%;border:1px solid var(--gray1);border-radius:8px;padding:9px 11px;font-size:13.5px;resize:vertical;font-family:inherit;"></textarea></div>
    <div class="field">
      <label>Due Date &amp; Time <span style="color:var(--gray2);font-weight:400;">(optional)</span></label>
      <input id="ctDue" type="datetime-local">
    </div>
    <div style="border-top:1px solid var(--gray1);margin:12px 0 10px;"></div>
    <div style="font-weight:700;font-size:12px;color:var(--gray3);margin-bottom:8px;">SEND TO</div>
    ${showTeacherTargets?`
    <div class="field">
      <label>Target Group</label>
      <select id="ctTargetGroup">
        <option value="students">Students</option>
        <option value="teachers">Teachers</option>
        <option value="both">Both (Students &amp; Teachers)</option>
      </select>
    </div>`:`<input type="hidden" id="ctTargetGroup" value="students">`}
    <div class="field">
      <label>Select Recipients</label>
      <select id="ctRecipFilter" style="margin-bottom:6px;">
        <option value="all">All (send to everyone in group)</option>
        <option value="pick">Pick specific…</option>
      </select>
    </div>
    <div id="ctPickWrap" style="display:none;">
      <input id="ctPickSearch" placeholder="🔍 Search name or ID…" style="width:100%;padding:8px 10px;border:1px solid var(--gray1);border-radius:8px;font-size:13px;margin-bottom:6px;">
      <div id="ctPickList" style="max-height:180px;overflow-y:auto;border:1px solid var(--gray1);border-radius:8px;"></div>
      <div style="font-size:11.5px;color:var(--gray2);margin-top:4px;" id="ctPickCount">0 selected</div>
    </div>
    <button class="btn green block" id="ctSubmit" style="margin-top:14px;">📤 Create &amp; Send</button>
  `,"wide");

  // dynamic: show/hide pick list
  const recipFilter=body.querySelector("#ctRecipFilter");
  const pickWrap=body.querySelector("#ctPickWrap");
  const pickSearch=body.querySelector("#ctPickSearch");
  const pickList=body.querySelector("#ctPickList");
  const pickCount=body.querySelector("#ctPickCount");
  const targetGroup=body.querySelector("#ctTargetGroup");

  let _selectedIds=new Set();

  function getPool(){
    const grp=typeof targetGroup.value==="undefined"?"students":targetGroup.value;
    if(grp==="teachers") return allTeachers;
    if(grp==="both") return [...allStudents,...allTeachers];
    return allStudents;
  }

  function renderPickList(filter=""){
    const pool=getPool();
    const fl=filter.toLowerCase();
    const shown=pool.filter(p=>!fl||p.name.toLowerCase().includes(fl)||p.id.toLowerCase().includes(fl));
    pickList.innerHTML=shown.map(p=>`
      <label style="display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:13px;">
        <input type="checkbox" value="${escapeHtml(p.id)}" ${_selectedIds.has(p.id)?"checked":""} style="width:15px;height:15px;flex:none;">
        <span>${escapeHtml(p.name)}</span><span style="color:var(--gray2);font-size:11px;">${escapeHtml(p.id)}</span>
      </label>`).join("")||`<div style="padding:10px;color:var(--gray2);font-size:12.5px;">No matches</div>`;
    // wire checkboxes
    pickList.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      cb.onchange=()=>{
        if(cb.checked) _selectedIds.add(cb.value);
        else _selectedIds.delete(cb.value);
        pickCount.textContent=`${_selectedIds.size} selected`;
      };
    });
  }

  recipFilter.onchange=()=>{
    pickWrap.style.display=recipFilter.value==="pick"?"block":"none";
    if(recipFilter.value==="pick"){ _selectedIds=new Set(); renderPickList(); }
  };
  if(targetGroup.addEventListener){
    targetGroup.addEventListener("change",()=>{ _selectedIds=new Set(); renderPickList(pickSearch.value); });
  }
  pickSearch.oninput=()=>renderPickList(pickSearch.value);

  body.querySelector("#ctSubmit").onclick=()=>{
    const title=body.querySelector("#ctTitle").value.trim();
    if(!title){ toast("Title is required.",false); return; }
    const type=body.querySelector("#ctType").value;
    const note=body.querySelector("#ctNote").value.trim();
    const dueRaw=body.querySelector("#ctDue").value;
    const dueTs=dueRaw? new Date(dueRaw).getTime() : null;
    const grp=typeof targetGroup.value==="undefined"?"students":targetGroup.value;
    let targets=[];
    if(recipFilter.value==="all"){
      const pool=getPool();
      targets=pool.map(p=>p.id);
    } else {
      targets=[..._selectedIds];
    }
    if(!targets.length){ toast("Please select at least one recipient.",false); return; }

    const task={
      id:newTaskId(),
      type, title, note, dueTs,
      createdAt:Date.now(),
      createdBy:creatorId,
      fromName:creatorName,
      targets,
      completions:{},
    };
    initTasks();
    DB.tasks.push(task);
    saveDB();
    closeModal();
    toast(`✅ ${type==="reminder"?"Reminder":"Task"} sent to ${targets.length} recipient(s)!`);
    if(STATE.role==="admin") showAdminPanel("tasks");
    else if(STATE.role==="teacher") showTeacherPanel("tasks");
  };
}

/* ── Shared: render a task list (admin/teacher created tasks) ────── */
function renderTaskList(container, tasks, canDelete, onDelete, onToggle, showTargets, viewerId){
  if(!tasks.length){
    container.innerHTML=`<div style="text-align:center;color:var(--gray2);padding:32px 0;font-size:13px;">No tasks yet.</div>`;
    return;
  }
  container.innerHTML="";
  tasks.forEach(task=>{
    const card=document.createElement("div");
    // For admin overview (no viewerId): show done only if ALL recipients done
    const isDone = viewerId ? taskDoneFor(task, viewerId) : taskDoneForAll(task);
    const doneAt  = viewerId ? taskDoneAtFor(task, viewerId) : null;
    card.className=`task-card${isDone?" done":""}`;
    const dueStr=task.dueTs?`Due ${_fmtDate(task.dueTs)} · `:"";
    const fromStr=task.fromName?`From: ${escapeHtml(task.fromName)} · `:"";
    const targStr=showTargets&&task.targets
      ? (()=>{ const total=task.targets.length; const doneCount=task.targets.filter(id=>taskDoneFor(task,id)).length; return doneCount+"/"+total+" done"; })()
      : "";
    const doneStr=isDone&&doneAt?` · Done ${_fmtDate(doneAt)}`:(isDone?" · Done":"");
    card.innerHTML=`
      <div class="tc-check ${isDone?"checked":""} ${task.type==="reminder"?"reminder-chk":""}" data-tid="${escapeHtml(task.id)}">${isDone?"✓":""}</div>
      <div class="tc-body">
        <div class="tc-title">${escapeHtml(task.title)}</div>
        ${task.note?`<div class="tc-note">${escapeHtml(task.note)}</div>`:""}
        <div class="tc-meta">
          <span class="tc-pill ${task.type}">${task.type==="reminder"?"🔔 Reminder":"✅ Task"}</span>
          <span>${dueStr}${fromStr}${targStr}${doneStr}</span>
        </div>
      </div>
      ${canDelete?`<button class="tc-del" data-tid="${escapeHtml(task.id)}" title="Delete task">🗑</button>`:""}
    `;
    const chk=card.querySelector(".tc-check");
    if(onToggle){
      chk.style.cursor="pointer";
      chk.onclick=()=>onToggle(task);
    } else {
      chk.style.cursor="default";
      chk.title="Recipients mark this done on their end";
    }
    if(canDelete){
      card.querySelector(".tc-del").onclick=()=>{ if(onDelete) onDelete(task); };
    }
    container.appendChild(card);
  });
}

function panelAdminTasks(main){
  initTasks();

  const adminName=(DB.adminProfile&&DB.adminProfile.name)||"Administrator";

  main.appendChild(el(`

        <select id="tfStatus"><option value="all">All Status</option><option value="pending">Pending</option><option value="done">Done</option></select>
        <select id="tfTarget"><option value="all">All Recipients</option><option value="students">To Students</option><option value="teachers">To Teachers</option></select>
        <input id="tfSearch" placeholder="🔍 Search title…" style="flex:1;min-width:120px;">
      </div>
      <div id="adminTaskList"></div>
    </div>`));

  main.querySelector("#btnNewTask").onclick=()=>dlgCreateTask("admin",adminId,adminName);

  function renderFiltered(){
    const type=main.querySelector("#tfType").value;
    const status=main.querySelector("#tfStatus").value;
    const target=main.querySelector("#tfTarget").value;
    const search=main.querySelector("#tfSearch").value.toLowerCase();
    const allStudentIds=new Set(Object.keys(DB.students||{}));
    const allTeacherIds=new Set(Object.keys(DB.teachers||{}));

    let tasks=[...DB.tasks].reverse().filter(t=>{
      if(type!=="all"&&t.type!==type) return false;
      const allDone=taskDoneForAll(t);
      if(status==="pending"&&allDone) return false;
      if(status==="done"&&!allDone) return false;
      if(search&&!t.title.toLowerCase().includes(search)) return false;
      if(target==="students"){ if(!t.targets||!t.targets.some(id=>allStudentIds.has(id))) return false; }
      if(target==="teachers"){ if(!t.targets||!t.targets.some(id=>allTeacherIds.has(id))) return false; }
      return true;
    });

    const listDiv=main.querySelector("#adminTaskList");
    renderTaskList(listDiv, tasks, true,
      (task)=>{ // delete
        if(!confirm(`Delete "${task.title}"?`)) return;
        DB.tasks=DB.tasks.filter(t=>t.id!==task.id);
        saveDB(); renderFiltered(); toast("Task deleted.");
      },
      null, // admin cannot personally toggle done — recipients mark their own
      true, // show targets count
      null  // no viewerId — admin sees aggregate status
    );
  }

  ["#tfType","#tfStatus","#tfTarget","#tfSearch"].forEach(sel=>{
    const el2=main.querySelector(sel);
    if(el2) el2.addEventListener(sel==="#tfSearch"?"input":"change", renderFiltered);
  });
  renderFiltered();
}

    const ai=GRADE_ORDER.indexOf(a), bi=GRADE_ORDER.indexOf(b);
    return (ai===-1?99:ai)-(bi===-1?99:bi);
  });

  function renderHistory(){
    const filterSid=(main.querySelector("#ghSidFilter")||{}).value||"all";
    const filterGrade=(main.querySelector("#ghGradeFilter")||{}).value||"all";

          <div>
            <div style="font-size:11.5px;font-weight:700;color:var(--gray3);margin-bottom:4px;">Student</div>
            <select id="ghSidFilter" style="padding:8px 11px;border:1px solid var(--gray1);border-radius:8px;font-size:13px;min-width:200px;">
              <option value="all">All Students</option>${sidOptions}
            </select>
          </div>
          <div>
            <div style="font-size:11.5px;font-weight:700;color:var(--gray3);margin-bottom:4px;">Grade Level</div>
            <select id="ghGradeFilter" style="padding:8px 11px;border:1px solid var(--gray1);border-radius:8px;font-size:13px;min-width:140px;">
              <option value="all">All Grades</option>${gradeOptions}
            </select>
          </div>
          <div style="flex:1;min-width:160px;">
            <div style="font-size:11.5px;font-weight:700;color:var(--gray3);margin-bottom:4px;">Search</div>
            <input id="ghSearch" placeholder="🔍 Search by name or ID…" style="width:100%;padding:8px 11px;border:1px solid var(--gray1);border-radius:8px;font-size:13px;">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="tbl-wrap" style="max-height:520px;">
          <table class="tbl">
            <thead><tr>
              <th>Student</th><th>Grade Level</th><th>Section</th>
              <th class="center">GPA</th><th>Promoted On</th><th>Subjects</th><th></th>
            </tr></thead>
            <tbody id="ghBody"><tr class="empty-row"><td colspan="7">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>`));

  ["#ghSidFilter","#ghGradeFilter"].forEach(sel=>{ const e=main.querySelector(sel); if(e) e.onchange=renderHistory; });
  const gs=main.querySelector("#ghSearch"); if(gs) gs.oninput=renderHistory;
  renderHistory();
}

/* ── Student: Grade History panel ────────────────────────────────── */
function panelStudentGradeHistory(main){
  const sid=STATE.sid;
  const s=DB.students[sid];
  const history=(s.gradeHistory||[]).slice().reverse(); // newest first

  if(!history.length){
    main.appendChild(el(`
      <div class="panel">
        <h1>📜 My Grade History</h1>
        <p class="lede">Grades from your previous grade levels are shown here after promotion.</p>
        <div class="card pad" style="text-align:center;padding:40px 24px;margin-top:10px;">
          <div style="font-size:38px;margin-bottom:10px;">📋</div>
          <div style="font-weight:700;color:var(--navy);margin-bottom:6px;">No history yet</div>
          <p class="muted" style="margin:0;">Your archived grades will appear here once you are promoted to the next grade level.</p>
        </div>
      </div>`));
    return;
  }

  let selIdx=STATE.studentHistoryIdx!==undefined?STATE.studentHistoryIdx:0;
  if(selIdx>=history.length) selIdx=0;

  function renderAll(){
    main.innerHTML="";
    const h=history[selIdx];

    // Sidebar-style grade level selector tabs
    const tabs=history.map((entry,i)=>{
      const active=i===selIdx;
      const gpaColor=entry.gpa>=3.5?"var(--green)":entry.gpa>=2.5?"var(--blue)":entry.gpa>=1.5?"var(--orange)":"var(--red)";
      return `<div class="gh-tab" data-i="${i}" style="cursor:pointer;padding:10px 14px;border-radius:8px;
        background:${active?"var(--blue)":"var(--white)"};color:${active?"#fff":"var(--dark)"};
        border:1px solid ${active?"var(--blue)":"var(--gray1)"};margin-bottom:8px;transition:.12s;">
        <div style="font-weight:700;font-size:13px;">${escapeHtml(entry.gradeLevel)}</div>
        <div style="font-size:11.5px;opacity:.8;">Section: ${escapeHtml(entry.section||"—")}</div>
        <div style="font-size:12px;font-weight:700;color:${active?"#cce7ff":gpaColor};margin-top:2px;">GPA: ${entry.gpa.toFixed(2)}</div>
      </div>`;
    }).join("");

    const subjects=Object.keys(h.grades||{});
    const subjectCards=subjects.map(subj=>{
      const g=h.grades[subj];
      const lc=g.letter?.[0]||"F";
      const color=lc==="A"?"var(--green)":lc==="B"?"var(--blue)":lc==="C"?"var(--yellow)":lc==="D"?"var(--orange)":"var(--red)";
      return `<div class="card pad" style="flex:1;min-width:150px;border-left:4px solid ${color};">
        <div style="font-weight:700;font-size:13px;color:var(--navy);margin-bottom:6px;">📚 ${escapeHtml(subj)}</div>
        <div style="font-size:22px;font-weight:800;color:${color};margin-bottom:2px;">${g.letter}</div>
        <div style="font-size:12px;color:var(--gray3);">Final: ${g.score.toFixed(1)}</div>
        <div style="font-size:11px;color:var(--gray2);margin-top:4px;">
          Q1:${fq(g.q1)} Q2:${fq(g.q2)} Q3:${fq(g.q3)} Q4:${fq(g.q4)}
        </div>
      </div>`;
    }).join("")||`<div class="card pad muted" style="text-align:center;">No subject grades on record.</div>`;

    const gpaColor=h.gpa>=3.5?"var(--green)":h.gpa>=2.5?"var(--blue)":h.gpa>=1.5?"var(--orange)":"var(--red)";

    main.appendChild(el(`
      <div class="panel">
        <h1>📜 My Grade History</h1>
        <p class="lede">Tap a grade level to view your archived grades.</p>
        <div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;">
          <!-- Grade level tabs -->
          <div style="min-width:180px;flex:none;">
            <div style="font-size:11.5px;font-weight:700;color:var(--gray3);margin-bottom:8px;letter-spacing:.4px;">GRADE LEVELS</div>
            <div id="ghTabList">${tabs}</div>
          </div>

          <!-- Detail panel -->
          <div style="flex:1;min-width:260px;">
            <div class="card pad" style="margin-bottom:14px;background:var(--sky);border-color:var(--lblue);">
              <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;">
                <div>
                  <div style="font-size:11.5px;font-weight:700;color:var(--gray3);">GRADE LEVEL</div>
                  <div style="font-size:18px;font-weight:800;color:var(--navy);">${escapeHtml(h.gradeLevel)}</div>
                </div>
                <div>
                  <div style="font-size:11.5px;font-weight:700;color:var(--gray3);">SECTION</div>
                  <div style="font-size:16px;font-weight:700;color:var(--dark);">${escapeHtml(h.section||"—")}</div>
                </div>
                <div>
                  <div style="font-size:11.5px;font-weight:700;color:var(--gray3);">GPA</div>
                  <div style="font-size:24px;font-weight:800;color:${gpaColor};">${h.gpa.toFixed(2)}</div>
                </div>
                <div>
                  <div style="font-size:11.5px;font-weight:700;color:var(--gray3);">PROMOTED ON</div>
                  <div style="font-size:13px;color:var(--dark);">${escapeHtml(h.promotedOn||"—")}</div>
                </div>
              </div>
            </div>

            <div style="font-size:11.5px;font-weight:700;color:var(--gray3);letter-spacing:.4px;margin-bottom:10px;">SUBJECTS</div>
            <div style="display:flex;flex-wrap:wrap;gap:10px;">${subjectCards}</div>
          </div>
        </div>
      </div>`));

    main.querySelectorAll(".gh-tab").forEach(tab=>{
      tab.onclick=()=>{ STATE.studentHistoryIdx=parseInt(tab.dataset.i); renderAll(); };
    });
  }

  renderAll();
}

function wireStaticUI(){
  $("#tabAdmin").onclick=()=>setLoginRole("admin");
  $("#tabTeacher").onclick=()=>setLoginRole("teacher");
  $("#tabStudent").onclick=()=>setLoginRole("student");
  $("#btnLogin").onclick=doLogin;
  $("#loginPass").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
  $("#loginUser").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
  $("#adminLogoutBtn").onclick=logout;
  $("#studentLogoutBtn").onclick=logout;
  $("#teacherLogoutBtn").onclick=logout;
}

document.addEventListener("DOMContentLoaded", async ()=>{
  wireStaticUI();
  await loadDB();
  startPolling();
  renderLogin();
  // Wire import confirm/cancel
  const cancelBtn=document.getElementById("importCancelBtn");
  const confirmBtn=document.getElementById("importConfirmBtn");
  const importOv=document.getElementById("importConfirmOverlay");
  if(cancelBtn) cancelBtn.onclick=()=>{ _pendingImportData=null; if(importOv) importOv.style.display="none"; };
  if(confirmBtn) confirmBtn.onclick=_doImportConfirm;
});

})();

</script>
