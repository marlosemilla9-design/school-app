<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Management System</title>
<style>
:root{
  --navy:#1a2e4a; --blue:#2563eb; --lblue:#3b82f6; --sky:#eff6ff;
  --white:#ffffff; --gray0:#f8fafc; --gray1:#e2e8f0; --gray2:#94a3b8;
  --gray3:#475569; --dark:#1e293b; --green:#16a34a; --red:#dc2626;
  --orange:#ea580c; --yellow:#ca8a04; --success:#dcfce7; --danger:#fee2e2;
  --warn:#fef9c3; --radius:10px; --shadow:0 1px 2px rgba(15,23,42,.06),0 1px 8px rgba(15,23,42,.05);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; background:var(--gray0); color:var(--dark);
  font-family:"Segoe UI",ui-sans-serif,Roboto,Helvetica,Arial,sans-serif;
  font-size:14px; -webkit-font-smoothing:antialiased;
}
.mono{font-family:"Consolas",ui-monospace,SFMono-Regular,Menlo,monospace;}
button{font-family:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--gray1);border-radius:8px;}

/* ── App root / screen switching ───────────────────────────────── */
#app{height:100vh;width:100vw;overflow:hidden;}
.screen{display:none;height:100%;width:100%;}
.screen.active{display:flex;}

/* ── Storage banner ─────────────────────────────────────────────── */
.storage-banner{
  position:fixed; bottom:14px; right:14px; z-index:40;
  background:var(--white); border:1px solid var(--gray1); border-radius:999px;
  padding:7px 10px 7px 10px; font-size:12px; color:var(--gray3);
  display:flex; align-items:center; gap:7px; box-shadow:var(--shadow);
  opacity:.95;
}
.storage-banner .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex:none;}

/* ── Login screen ───────────────────────────────────────────────── */
#screen-login{align-items:center;justify-content:center;background:
  radial-gradient(900px 500px at 15% -10%, #24406b 0%, var(--navy) 55%, #142339 100%);
}
.login-wrap{width:380px;max-width:92vw;}
.login-head{text-align:center;padding:6px 0 26px;color:#fff;}
.login-head .crest{
  width:60px;height:60px;margin:0 auto 14px;border-radius:16px;
  background:linear-gradient(135deg,var(--blue),var(--lblue));
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 10px 24px rgba(37,99,235,.45);
}
.login-head h1{font-size:20px;margin:0 0 4px;font-weight:700;letter-spacing:.2px;}
.login-head p{margin:0;color:#9fb3d6;font-size:13px;letter-spacing:.4px;text-transform:uppercase;}
.login-card{
  background:var(--white); border-radius:16px; padding:26px 26px 22px;
  box-shadow:0 30px 60px rgba(0,0,0,.35);
}
.role-tabs{display:flex;background:var(--gray1);border-radius:10px;padding:4px;margin-bottom:18px;}
.role-tabs button{
  flex:1;border:none;background:transparent;padding:9px 0;border-radius:8px;
  font-weight:600;font-size:13px;color:var(--gray3);cursor:pointer;transition:.15s;
}
.role-tabs button.active{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.35);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--gray3);margin-bottom:5px;font-weight:600;}
.field input{
  width:100%;padding:10px 12px;border:1px solid var(--gray1);border-radius:8px;
  background:var(--gray0);font-size:14px;color:var(--dark);
}
.field input:focus{outline:2px solid var(--blue);outline-offset:0;border-color:var(--blue);}
.login-error{
  background:var(--danger);color:var(--red);font-size:12.5px;border-radius:8px;
  padding:8px 10px;margin-bottom:12px;display:none;
}
.login-error.show{display:block;}
.login-hint{margin-top:16px;text-align:center;font-size:11.5px;color:var(--gray2);line-height:1.6;}

/* ── Buttons ────────────────────────────────────────────────────── */
.btn{
  border:none;border-radius:8px;padding:9px 16px;font-size:13.5px;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.12s;
  color:#fff;background:var(--blue); white-space:nowrap;
}
.btn:hover{background:var(--lblue);}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn.block{width:100%;justify-content:center;}
.btn.green{background:var(--green);} .btn.green:hover{background:#1ea049;}
.btn.red{background:var(--red);} .btn.red:hover{background:#e7423b;}
.btn.orange{background:var(--orange);} .btn.orange:hover{background:#f06a1f;}
.btn.gray{background:var(--gray3);} .btn.gray:hover{background:#5a6b85;}
.btn.ghost{background:var(--white);color:var(--dark);border:1px solid var(--gray1);}
.btn.ghost:hover{background:var(--gray0);}
.btn.sm{padding:6px 11px;font-size:12.5px;}

/* ── Sidebar layout (admin & student) ──────────────────────────────*/
.app-shell{display:flex;width:100%;height:100%;}
.sidebar{
  width:202px;flex:none;background:var(--navy);color:#fff;
  display:flex;flex-direction:column;height:100%;
}
.sidebar .brand{padding:20px 14px 14px;text-align:center;border-bottom:1px solid #2a4368;}
.sidebar .brand .ico{font-size:26px;}
.sidebar .brand .who{font-weight:700;margin-top:6px;font-size:13.5px;word-break:break-word;}
.sidebar .brand .sub{font-size:11.5px;color:#92a8cc;margin-top:2px;}
.sidebar nav{flex:1;padding:8px 0;overflow-y:auto;}
.navbtn{
  display:flex;align-items:center;gap:10px;width:100%;padding:11px 18px;
  background:transparent;border:none;color:#cfdcef;font-size:13.5px;font-weight:500;
  cursor:pointer;text-align:left;border-left:3px solid transparent;
}
.navbtn:hover{background:#223c60;}
.navbtn.active{background:var(--blue);color:#fff;border-left-color:#9ec5ff;}
.sidebar .logout{
  border-top:1px solid #2a4368;padding:13px 18px;background:transparent;border:none;
  color:#9fb3d6;font-size:12.5px;cursor:pointer;text-align:left;
}
.sidebar .logout:hover{color:#fff;}
.main{flex:1;overflow-y:auto;background:var(--gray0);height:100%;}
.panel{padding:26px 30px 40px;max-width:1180px;}
.panel h1{font-size:21px;margin:0 0 4px;color:var(--dark);}
.panel .lede{color:var(--gray2);font-size:13px;margin:0 0 18px;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.row-between h1{margin:0;}

/* ── Cards / tables ─────────────────────────────────────────────── */
.card{background:var(--white);border:1px solid var(--gray1);border-radius:var(--radius);box-shadow:var(--shadow);}
.card.pad{padding:18px 20px;}
.stat-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.stat{flex:1;min-width:110px;background:var(--white);border:1px solid var(--gray1);border-radius:var(--radius);
  padding:14px 10px;text-align:center;}
.stat .num{font-size:24px;font-weight:700;}
.stat .lab{font-size:11.5px;color:var(--gray2);margin-top:2px;}

table.tbl{width:100%;border-collapse:collapse;font-size:13px;}
table.tbl thead th{
  text-align:left;background:var(--gray0);color:var(--gray3);font-weight:700;
  font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:9px 10px;
  border-bottom:1px solid var(--gray1);position:sticky;top:0;
}
table.tbl td{padding:9px 10px;border-bottom:1px solid #eef1f6;}
table.tbl tbody tr:hover{background:var(--sky);}
table.tbl tbody tr.sel{background:#dbeafe;}
.tbl-wrap{max-height:420px;overflow:auto;border:1px solid var(--gray1);border-radius:var(--radius);}
.tbl-wrap table.tbl thead th{position:sticky;top:0;}
.center{text-align:center;}
.muted{color:var(--gray2);}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;}
.pill.ok{background:var(--success);color:var(--green);}
.pill.bad{background:var(--danger);color:var(--red);}
.pill.warn{background:var(--warn);color:var(--yellow);}
.empty-row td{text-align:center;color:var(--gray2);padding:26px 10px;font-size:13px;}

.grade-A{background:#f0fdf4;} .grade-B{background:#eff6ff;}
.grade-C{background:#fef9c3;} .grade-D{background:#fff7ed;} .grade-F{background:#fff1f2;}

select,.select{
  width:100%;padding:9px 11px;border:1px solid var(--gray1);border-radius:8px;
  background:var(--white);font-size:13.5px;color:var(--dark);
}

/* ── Modal ──────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;
  align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--white);border-radius:14px;max-width:420px;width:100%;
  max-height:88vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,.35);
}
.modal-box.wide{max-width:680px;}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--gray1);
}
.modal-head h2{font-size:16px;margin:0;color:var(--dark);}
.modal-head .x{background:none;border:none;font-size:18px;color:var(--gray2);cursor:pointer;line-height:1;}
.modal-body{padding:20px 22px;}
.modal-help{font-size:12px;color:var(--gray2);text-align:center;margin:-4px 0 14px;line-height:1.5;}

/* ── Toast ──────────────────────────────────────────────────────── */
#toastHost{position:fixed;top:18px;right:18px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--success);color:var(--green);padding:11px 18px;border-radius:9px;
  font-size:13px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.12);
  animation:toastIn .18s ease-out; max-width:320px;
}
.toast.bad{background:var(--danger);color:var(--red);}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* ── Misc ───────────────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.qr-tile{background:var(--white);border:1px solid var(--gray1);border-radius:var(--radius);padding:12px;text-align:center;}
.qr-tile img{width:100%;max-width:130px;image-rendering:pixelated;border-radius:6px;border:1px solid var(--gray1);}
.qr-tile .nm{font-weight:700;font-size:12.5px;margin-top:8px;}
.qr-tile .id{font-size:11px;color:var(--gray2);}
.scanner-video-wrap{
  background:var(--dark);border-radius:var(--radius);overflow:hidden;width:100%;
  max-width:480px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.scanner-video-wrap video{width:100%;height:100%;object-fit:cover;}
.scanner-video-wrap .placeholder{color:var(--gray2);font-size:13px;}
.scan-status{font-size:16px;font-weight:700;margin-bottom:10px;}
.scan-info-row{display:flex;gap:8px;font-size:13px;margin-bottom:2px;}
.scan-info-row .lab{width:78px;color:var(--gray3);font-weight:600;}

/* ── Profile avatars ─────────────────────────────────────────────── */
.avatar-wrap{position:relative;display:inline-block;margin-bottom:10px;}
.avatar-img{
  width:88px;height:88px;border-radius:50%;object-fit:cover;
  border:3px solid var(--gray1);background:var(--sky);
  display:block;
}
.avatar-emoji{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg,var(--sky),#dbeafe);
  border:3px solid var(--gray1);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
}
.avatar-change-btn{
  position:absolute;bottom:0;right:0;
  background:var(--blue);color:#fff;border:2px solid #fff;
  border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;line-height:1;
}
.avatar-change-btn:hover{background:var(--lblue);}
.avatar-modal-preview{
  width:90px;height:90px;border-radius:50%;object-fit:cover;
  border:3px solid var(--gray1);margin:0 auto 12px;display:block;
  background:var(--sky);
}
.avatar-modal-emoji{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,var(--sky),#dbeafe);
  border:3px solid var(--gray1);
  display:flex;align-items:center;justify-content:center;
  font-size:46px;margin:0 auto 12px;
}

/* ── Responsive: fluid font scaling ─────────────────────────────── */
html { font-size: clamp(13px, 1.5vw, 15px); }

/* ── Responsive: Tablet (≤900px) ───────────────────────────────── */
@media (max-width:900px){
  .sidebar{width:70px;}
  .sidebar .brand .who,.sidebar .brand .sub,.navbtn span.lbl{display:none;}
  .navbtn{justify-content:center;padding:13px 0;}
  .panel{padding:20px 16px 36px;}
  .two-col{grid-template-columns:1fr;}
  .stat{min-width:90px;}
  .stat .num{font-size:20px;}
  .modal-box{max-width:95vw;}
  .modal-box.wide{max-width:95vw;}
  .tbl-wrap{max-height:320px;}
  table.tbl{font-size:12px;}
  table.tbl thead th{font-size:10.5px;padding:7px 8px;}
  table.tbl td{padding:7px 8px;}
}

/* ── Responsive: Phone (≤600px) ─────────────────────────────────── */
@media (max-width:600px){
  html{font-size:13px;}

  /* Login */
  .login-wrap{width:100%;max-width:100%;padding:0 12px;}
  .login-head h1{font-size:16px;}
  .login-head p{font-size:11px;}
  .login-card{padding:18px 14px 16px;border-radius:12px;}
  .role-tabs button{font-size:12px;padding:7px 0;}
  .field input{font-size:13px;padding:9px 10px;}
  .login-hint{font-size:11px;}

  /* Sidebar → bottom nav bar on phone */
  .app-shell{flex-direction:column;}
  .sidebar{
    width:100%;height:auto;flex-direction:row;
    order:2;border-top:1px solid #2a4368;
    overflow-x:auto;
  }
  .sidebar .brand{display:none;}
  .sidebar nav{
    display:flex;flex-direction:row;flex:1;
    padding:0;overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
  }
  .navbtn{
    flex-direction:column;gap:2px;padding:8px 10px;
    font-size:10px;justify-content:center;
    min-width:56px;border-left:none;border-top:3px solid transparent;
  }
  .navbtn.active{border-left-color:transparent;border-top-color:#9ec5ff;}
  .navbtn span.lbl{display:block !important;font-size:9.5px;}
  .navbtn .ico{font-size:18px;}
  .sidebar .logout{
    padding:8px 12px;font-size:11px;
    border-top:none;border-left:1px solid #2a4368;
    display:flex;align-items:center;
  }

  /* Main content */
  .main{order:1;height:calc(100vh - 58px);}
  .panel{padding:14px 10px 30px;}
  .panel h1{font-size:17px;}
  .panel .lede{font-size:12px;}
  .row-between{flex-direction:column;align-items:flex-start;gap:8px;}
  .row-between h1{font-size:16px;}

  /* Cards & stats */
  .stat-row{gap:8px;}
  .stat{min-width:80px;padding:10px 6px;}
  .stat .num{font-size:18px;}
  .stat .lab{font-size:10.5px;}
  .card.pad{padding:12px 12px;}

  /* Tables */
  .tbl-wrap{max-height:260px;}
  table.tbl{font-size:11.5px;}
  table.tbl thead th{font-size:10px;padding:6px 6px;letter-spacing:.2px;}
  table.tbl td{padding:6px 6px;}

  /* Buttons */
  .btn{font-size:12.5px;padding:8px 12px;}
  .btn.sm{font-size:11.5px;padding:5px 9px;}

  /* Modal */
  .modal-overlay{padding:8px;}
  .modal-box{border-radius:10px;max-height:92vh;}
  .modal-head{padding:14px 16px;}
  .modal-head h2{font-size:14px;}
  .modal-body{padding:14px 16px;}

  /* Grid layouts */
  .two-col{grid-template-columns:1fr;}
  .qr-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .qr-tile{padding:8px;}

  /* Storage banner */
  .storage-banner{
    bottom:66px;right:8px;
    font-size:11px;padding:5px 8px;gap:5px;
  }

  /* Toast */
  #toastHost{top:10px;right:8px;left:8px;}
  .toast{font-size:12px;padding:9px 14px;max-width:100%;}
}

/* ── Tasks & Reminders ───────────────────────────────────────────── */
.task-popup-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.0);z-index:300;
  pointer-events:none;display:flex;flex-direction:column;
  align-items:flex-end;justify-content:flex-start;
  padding:18px 18px 0 0;gap:10px;
}
.task-popup{
  pointer-events:all;
  background:var(--white);border:1px solid var(--gray1);border-radius:14px;
  box-shadow:0 12px 40px rgba(15,23,42,.18);
  padding:16px 18px 14px;max-width:340px;width:100%;
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.task-popup.reminder{border-left:4px solid var(--orange);}
.task-popup.todo{border-left:4px solid var(--blue);}
@keyframes popIn{from{opacity:0;transform:translateY(-16px) scale(.95);}to{opacity:1;transform:none;}}
.task-popup .tp-type{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;}
.task-popup.reminder .tp-type{color:var(--orange);}
.task-popup.todo .tp-type{color:var(--blue);}
.task-popup .tp-title{font-weight:700;font-size:14px;color:var(--dark);margin-bottom:3px;}
.task-popup .tp-body{font-size:12.5px;color:var(--gray3);line-height:1.45;margin-bottom:10px;}
.task-popup .tp-from{font-size:11px;color:var(--gray2);margin-bottom:10px;}
.task-popup .tp-actions{display:flex;gap:8px;}
.task-popup .tp-dismiss{
  border:none;background:var(--gray1);color:var(--gray3);border-radius:7px;
  padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;flex:1;
}
.task-popup .tp-done{
  border:none;background:var(--green);color:#fff;border-radius:7px;
  padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;flex:1;
}
.task-popup .tp-close{
  position:absolute;top:10px;right:12px;background:none;border:none;
  color:var(--gray2);font-size:16px;cursor:pointer;line-height:1;padding:0;
}
.task-card{
  background:var(--white);border:1px solid var(--gray1);border-radius:10px;
  padding:13px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;
}
.task-card.done{opacity:.55;}
.task-card .tc-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--gray1);
  flex:none;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:.12s;
}
.task-card .tc-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
.task-card .tc-check.reminder-chk{border-color:var(--orange);}
.task-card .tc-check.reminder-chk.checked{background:var(--orange);border-color:var(--orange);}
.task-card .tc-body{flex:1;min-width:0;}
.task-card .tc-title{font-weight:700;font-size:13.5px;color:var(--dark);margin-bottom:2px;}
.task-card.done .tc-title{text-decoration:line-through;color:var(--gray2);}
.task-card .tc-note{font-size:12.5px;color:var(--gray3);margin-bottom:4px;line-height:1.4;}
.task-card .tc-meta{font-size:11px;color:var(--gray2);display:flex;gap:8px;flex-wrap:wrap;}
.task-card .tc-pill{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10.5px;font-weight:700;}
.task-card .tc-pill.todo{background:#eff6ff;color:var(--blue);}
.task-card .tc-pill.reminder{background:#fff7ed;color:var(--orange);}
.task-card .tc-del{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:14px;padding:2px 4px;flex:none;}
.task-card .tc-del:hover{color:var(--red);}
.task-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.task-filter-bar select,.task-filter-bar input{
  padding:7px 10px;border:1px solid var(--gray1);border-radius:8px;
  font-size:13px;background:var(--white);color:var(--dark);
}

/* ── Responsive: very small phones (≤380px) ──────────────────────── */
@media (max-width:380px){
  .navbtn{min-width:46px;padding:7px 6px;}
  .navbtn span.lbl{font-size:8.5px;}
  .stat .num{font-size:16px;}
  .panel h1{font-size:15px;}
  .btn{font-size:12px;padding:7px 10px;}
}

</style>
</head>
<body>

<div id="app">

  <!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
  <div class="screen active" id="screen-login">
    <div class="login-wrap">
      <div class="login-head">
        <div class="crest">🎓</div>
        <h1>School Management System</h1>
    
      </div>
      <div class="login-card">
        <div class="role-tabs">
          <button id="tabAdmin" class="active">Admin</button>
          <button id="tabTeacher">Teacher</button>
          <button id="tabStudent">Student</button>
        </div>
        <div class="login-error" id="loginError"></div>
        <div class="field">
          <label id="loginUserLabel">Username</label>

        var b0 = bin.read();

        var b2 = read();
        var b3 = read();

      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {

  [77,"C+"],[73,"C"],[70,"C-"],[67,"D+"],[63,"D"],[60,"D-"],[0,"F"]

function promoteStudent(sid){
  const s = DB.students[sid];
  const currentGrade = (s.year||"").trim();
  const idx = GRADE_ORDER.findIndex(g => g.toLowerCase() === currentGrade.toLowerCase());
  if(idx === -1){
    toast(`⚠️ "${currentGrade||"(no grade)"}" is not in the grade list. Edit the student and set a valid grade (e.g. Grade 1).`, false);
    return;
  }

  // Archive current grades into gradeHistory before clearing
  if(!s.gradeHistory) s.gradeHistory = [];
  const currentGrades = s.grades || {};
  if(Object.keys(currentGrades).length > 0){
    s.gradeHistory.push({
      gradeLevel: currentGrade,
      section: s.section || "",
      promotedOn: todayStr(),
      grades: JSON.parse(JSON.stringify(currentGrades)),
      gpa: computeGPA(currentGrades)

  }

  if(idx === GRADE_ORDER.length - 1){
    s.status = "Graduated";
    s.grades = {}; // clear grades on graduation too
    saveDB();
    toast(`🎓 ${s.name} has been marked as Graduated!`);
  } else {
    const nextGrade = GRADE_ORDER[idx + 1];
    s.year = nextGrade;

let DB = null;

function setBannerStatus(text, color){
  const dot=document.getElementById("savedDot");
  const banner=document.getElementById("savedBannerText");
  if(dot) dot.style.background=color;
  if(banner) banner.textContent=text;

function flashSavingDot(){ setBannerStatus("Saving…", "var(--yellow)"); }

async function saveDB(force=false){
  flashSavingDot();
  _saveQueued = true;
  if(_saving) return; // a save is already in flight; it will pick up the queued flag below
  _saving = true;
  while(_saveQueued){
    _saveQueued = false;
    try{
      const res = await fetch("/api/data", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: DB, baseVersion: DB_VERSION, force })
      });
      if(res.status === 409){
        // Someone else (another account / another device) saved first.
        const body = await res.json();
        DB = body.data; DB_VERSION = body.version;
        toast("⚠ Someone else just saved changes. Loaded the latest data — please check and redo your last edit if it's missing.", false);
        refreshCurrentView();
        flashSavedDot();
      } else if(res.ok){
        const body = await res.json();
        DB_VERSION = body.version;
        _dbReachable = true;
        flashSavedDot();
      } else {
        throw new Error("Server responded with " + res.status);
      }
    }catch(e){
      console.error("saveDB failed", e);
      _dbReachable = false;
      flashOfflineDot();
      toast("⚠ Could not reach the server. Your change is kept on this screen and will be saved automatically once the connection is back.", false);
      // Try again shortly — keep this change queued until it succeeds.
      _saveQueued = true;
      await new Promise(r=>setTimeout(r, 4000));
    }
  }
  _saving = false;
}

/* ── live sync: pick up changes saved from OTHER accounts/devices ─ */
let _pollTimer = null;
function startPolling(){
  if(_pollTimer) return;
  _pollTimer = setInterval(async ()=>{
    if(!STATE.role) return;                     // not logged in yet
    if(_saving) return;                          // don't fight an in-flight save
    const modalOpen = document.getElementById("modalOverlay")?.classList.contains("open");
    if(modalOpen) return;                        // don't yank data out from under an open form
    if(STATE.role==="admin" && STATE.adminPanel==="scanner") return; // don't restart the camera
    try{
      const vres = await fetch("/api/version");
      if(!vres.ok) return;
      const { version } = await vres.json();
      if(!_dbReachable){ _dbReachable=true; flashSavedDot(); hideConnError(); }
      if(version !== DB_VERSION){
        const dres = await fetch("/api/data");
        if(!dres.ok) return;
        const body = await dres.json();
        DB = body.data; DB_VERSION = body.version;
        refreshCurrentView();

             +"_"+String(now.getHours()).padStart(2,"0")+String(now.getMinutes()).padStart(2,"0");

    const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});

let DB_LOAD_FAILED = false;
async function loadDB(){
  try{
    const res = await fetch("/api/data");
    if(!res.ok) throw new Error("Server responded with "+res.status);
    const body = await res.json();
    DB = body.data; DB_VERSION = body.version;
    if(!DB.teachers) DB.teachers={};
    if(!DB.messages) DB.messages=[];
    if(!DB.subjectAttendance) DB.subjectAttendance={};
    if(!DB.quizGrades) DB.quizGrades={};
    _dbReachable = true;
    flashSavedDot();
  }catch(e){
    console.error("Could not load data from server:", e);
    DB_LOAD_FAILED = true;
    showConnError();
  }
}
function showConnError(){
  let ov = document.getElementById("connErrorOverlay");
  if(!ov){
    ov = document.createElement("div");
    ov.id = "connErrorOverlay";
    ov.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.9);z-index:500;display:flex;align-items:center;justify-content:center;";
    ov.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:30px 28px;max-width:380px;width:92%;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.4);">

          connected to the same WiFi/network.

/* ── tiny DOM helpers ───────────────────────────────────────────── */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
function el(html){
  const t=document.createElement("template");
  t.innerHTML=html.trim();
  return t.content.firstElementChild;
}
function escapeHtml(s){
  return String(s===undefined||s===null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function toast(msg, ok=true){
  const host=document.getElementById("toastHost");
  const t=el(`<div class="toast ${ok?"":"bad"}">${escapeHtml(msg)}</div>`);
  host.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .25s"; setTimeout(()=>t.remove(),260); }, 2300);
}
function openModal(title, bodyHtml, wide=false){
  $("#modalTitle").textContent=title;
  $("#modalBody").innerHTML=bodyHtml;
  $("#modalBox").classList.toggle("wide", !!wide);
  $("#modalOverlay").classList.add("open");

}
function closeModal(){
  $("#modalOverlay").classList.remove("open");
  $("#modalBody").innerHTML="";
}
document.addEventListener("DOMContentLoaded", ()=>{

function renderLogin(){
  showScreen("screen-login");
  setLoginRole(STATE.loginRole);
  $("#loginUser").value=""; $("#loginPass").value="";
  hideLoginError();
  $("#loginUser").focus();
}
function setLoginRole(role){
  STATE.loginRole=role;
  $("#tabAdmin").classList.toggle("active", role==="admin");
  $("#tabTeacher").classList.toggle("active", role==="teacher");
  $("#tabStudent").classList.toggle("active", role==="student");
  $("#loginUserLabel").textContent = role==="admin" ? "Username" : role==="teacher" ? "Teacher ID" : "Student ID";
}
function showLoginError(msg){
  const e=$("#loginError"); e.textContent=msg; e.classList.add("show");
}
function hideLoginError(){ $("#loginError").classList.remove("show"); }

async function doLogin(){
  if(!DB){
    showLoginError("Not connected to the server. Retrying…");
    await loadDB();
    if(!DB) return;
    hideLoginError();
  }
  const u=$("#loginUser").value.trim();
  const pw=$("#loginPass").value;
  if(!u||!pw){ showLoginError("Please fill in both fields."); return; }
  hideLoginError();
  if(STATE.loginRole==="admin"){
    const h=await sha256(pw);
    if(DB.admins[u] && DB.admins[u]===h){ STATE.role="admin"; enterAdmin(); stopTaskPopups(); }
    else showLoginError("Invalid username or password.");
  }else if(STATE.loginRole==="teacher"){
    const t=DB.teachers&&DB.teachers[u];
    if(!t){ showLoginError("Invalid Teacher ID or password."); return; }
    const h=await sha256(pw);
    if(t.pwHash===h){ STATE.role="teacher"; STATE.tid=u; enterTeacher(u); startTaskPopups(); }
    else showLoginError("Invalid Teacher ID or password.");
  }else{
    const s=DB.students[u];
    if(!s){ showLoginError("Invalid Student ID or password."); return; }
    const h=await sha256(pw);
    if(s.pwHash===h){ STATE.role="student"; STATE.sid=u; enterStudent(u); startTaskPopups(); }
    else showLoginError("Invalid Student ID or password.");
  }
}
function logout(){
  stopScanner();
  stopTaskPopups();
  _shownPopups=new Set();
  STATE.role=null; STATE.sid=null; STATE.tid=null;
  renderLogin();
}

      <div class="card pad" style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div class="field" style="margin:0;flex:1;min-width:160px;">
          <label style="font-size:12px;font-weight:700;color:var(--gray3);">Filter by Sender</label>
          <select id="msgFilterSender" style="margin-top:4px;">
            <option value="">All Senders</option>
            <option value="admin">👤 Admin</option>
            ${Object.entries(DB.teachers||{}).filter(([tid])=>sendersInLog.includes(tid)).map(([tid,t])=>
              `<option value="${escapeHtml(tid)}">👩‍🏫 ${escapeHtml(t.name)}</option>`).join("")}
          </select>
        </div>
        <div class="field" style="margin:0;flex:1;min-width:140px;">
          <label style="font-size:12px;font-weight:700;color:var(--gray3);">Filter by Date</label>
          <input type="date" id="msgFilterDate" style="margin-top:4px;width:100%;padding:9px 11px;border:1px solid var(--gray1);border-radius:8px;font-size:13.5px;">
        </div>
        <div style="flex:none;">
          <button class="btn ghost sm" id="msgFilterClear">✕ Clear</button>
        </div>
      </div>

      <!-- Message log -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="font-weight:700;font-size:13px;color:var(--dark);">📋 Message History</div>
        <div id="msgFilterCount" style="font-size:12px;color:var(--gray2);"></div>
      </div>
      <div class="card">
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th style="white-space:nowrap;">Date</th><th>Sender</th><th>Role</th><th>Recipients</th><th>Message</th></tr></thead>
            <tbody id="adminMsgBody"></tbody>
          </table>
        </div>
      </div>
    </div>`));

  function renderMsgTable(){
    const filterSender=$("#msgFilterSender").value;
    const filterDate=$("#msgFilterDate").value;
    let filtered=allMsgs;
    if(filterSender) filtered=filtered.filter(m=>m.fromId===filterSender);
    if(filterDate) filtered=filtered.filter(m=>m.date===filterDate);
    const count=filtered.length;
    $("#msgFilterCount").textContent=count===allMsgs.length?`${count} message${count!==1?"s":""}`:`${count} of ${allMsgs.length} shown`;
    $("#adminMsgBody").innerHTML=filtered.length?filtered.map(m=>{
      const isAdmin=m.fromId==="admin";
      const isTeacher=m.fromId&&!isAdmin;
      const roleLabel=isAdmin?`<span class="pill ok" style="font-size:10.5px;">Admin</span>`
        :isTeacher?`<span class="pill warn" style="font-size:10.5px;">Teacher</span>`
        :`<span class="pill" style="background:var(--sky);color:var(--gray3);font-size:10.5px;">System</span>`;

        <td style="white-space:nowrap;">${escapeHtml(m.date)}</td>
        <td style="font-weight:600;">${escapeHtml(m.from)}</td>
        <td>${roleLabel}</td>

        <td style="max-width:280px;word-break:break-word;">${escapeHtml(m.body)}</td>
      </tr>`;
    }).join(""):`<tr class="empty-row"><td colspan="5">${filterSender||filterDate?"No messages match this filter.":"No messages yet."}</td></tr>`;
  }

  renderMsgTable();
  $("#msgFilterSender").onchange=renderMsgTable;
  $("#msgFilterDate").onchange=renderMsgTable;
  $("#msgFilterClear").onclick=()=>{ $("#msgFilterSender").value=""; $("#msgFilterDate").value=""; renderMsgTable(); };
  $("#btnSendMsg").onclick=()=>dlgSendMessage("admin","Admin");
  $("#btnMsgAllActive").onclick=()=>dlgMessageAllActive();
}

      </div>
      ${groups[gk].map(sid=>`
        <label style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--gray1);cursor:pointer;">
          <input type="checkbox" class="assignChk" data-sid="${sid}" ${assigned.has(sid)?"checked":""} style="width:16px;height:16px;accent-color:var(--blue);flex:none;">
          <span><span style="font-weight:600;">${escapeHtml(DB.students[sid].name)}</span>
          <span class="muted mono" style="font-size:11px;margin-left:6px;">${escapeHtml(sid)}</span></span>
        </label>`).join("")}
    </div>`).join("");
  const body=openModal(`👥 Assign Students — ${escapeHtml(t.name)}`,`
    <p class="modal-help">Check students to assign to this teacher. You can select entire groups.</p>
    <div style="max-height:380px;overflow-y:auto;border:1px solid var(--gray1);border-radius:8px;padding:12px 14px;margin-bottom:14px;">

      <button class="btn green" id="asSubmit">💾 Save Assignment</button>
    </div>
  `,true);
  // Make toggleGroupAssign work inside modal
  window.toggleGroupAssign=function(btn,gkey){
    const chks=body.querySelectorAll('.assignChk');
    const gSids=groups[gkey]||[];
    const allChecked=gSids.every(s=>body.querySelector(`.assignChk[data-sid="${s}"]`)?.checked);
    gSids.forEach(s=>{ const c=body.querySelector(`.assignChk[data-sid="${s}"]`); if(c) c.checked=!allChecked; });
    btn.textContent=allChecked?"Select Group":"Deselect Group";

    saveDB(); closeModal(); showAdminPanel("teachers");
    toast(`✅ ${selected.length} student(s) assigned to ${t.name}`);
  };
}


function dlgMessageGroup(group){
  // Collect all phone numbers from students
  const allRecipients=[];
  const seen=new Set();
  group.students.forEach(s=>{
    const addR=(phone,label,name,studentName)=>{
      const cleaned=phone.replace(/\D/g,"");
      if(!cleaned) return;
      const key=cleaned+"|"+label;
      if(seen.has(key)) return;
      seen.add(key);
      allRecipients.push({phone:cleaned,raw:phone,label,name,studentName});
    };
    if(s.phone) addR(s.phone,"Student",s.name,s.name);
    if(s.emergencyPhone) addR(s.emergencyPhone,"Emergency",s.emergencyContact||s.name+" (Emergency)",s.name);
  });

  const hasStudentNums=allRecipients.some(r=>r.label==="Student");
  const hasEmergencyNums=allRecipients.some(r=>r.label==="Emergency");

  // Build recipient rows with optional search filter
  function buildRecipientRows(typeFilter, searchText){
    let list = typeFilter==="all" ? allRecipients
      : typeFilter==="student" ? allRecipients.filter(r=>r.label==="Student")
      : allRecipients.filter(r=>r.label==="Emergency");
    if(searchText){
      const q=searchText.toLowerCase();
      list=list.filter(r=>r.name.toLowerCase().includes(q)||r.raw.includes(q)||(r.studentName&&r.studentName.toLowerCase().includes(q)));
    }
    if(!list.length) return `<div class="muted" style="padding:14px 0;text-align:center;">
      No matching recipients found.<br><small>Try a different filter or search term.</small></div>`;
    return list.map(r=>`
      <label style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray1);cursor:pointer;">
        <input type="checkbox" class="msgRecip" data-phone="${escapeHtml(r.phone)}" data-raw="${escapeHtml(r.raw)}" data-label="${escapeHtml(r.label)}" data-name="${escapeHtml(r.name)}" checked
          style="width:16px;height:16px;accent-color:var(--blue);flex:none;">
        <span style="flex:1;">
          <span style="font-weight:600;">${escapeHtml(r.name)}</span>
          <span class="pill ${r.label==="Student"?"ok":"warn"}" style="margin-left:6px;font-size:10px;">${r.label}</span>
          ${r.label==="Emergency"?`<span style="font-size:11px;color:var(--gray2);margin-left:4px;">for ${escapeHtml(r.studentName)}</span>`:""}
          <br><span class="muted mono" style="font-size:12px;">${escapeHtml(r.raw)}</span>
        </span>
      </label>`).join("");
  }

  const body=openModal(`💬 Message — ${escapeHtml(group.year)} · ${escapeHtml(group.section)}`,`
    <p class="modal-help" style="margin-bottom:12px;">
      Compose a message, choose who to send it to, and pick the platform.
    </p>

    <!-- ① SEND TO (type filter) -->
    <div style="margin-bottom:12px;">
      <div style="font-weight:700;font-size:11px;color:var(--gray3);letter-spacing:.5px;margin-bottom:6px;">① SEND TO</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn sm sendToBtn" data-filter="all" style="background:var(--blue);color:#fff;">👥 All</button>
        <button class="btn sm sendToBtn ghost" data-filter="student">📱 Students ${hasStudentNums?"":"<span style='opacity:.5'>(none)</span>"}</button>
        <button class="btn sm sendToBtn ghost" data-filter="emergency">🚨 Emergency ${hasEmergencyNums?"":"<span style='opacity:.5'>(none)</span>"}</button>
      </div>
    </div>

    <!-- ② SEND VIA (platform) -->
    <div style="margin-bottom:12px;">
      <div style="font-weight:700;font-size:11px;color:var(--gray3);letter-spacing:.5px;margin-bottom:6px;">② SEND VIA</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn sm sendViaBtn" data-via="sms" style="background:var(--blue);color:#fff;" id="viaSmsBtnGrp">
          ${/Mobi|Android|iPhone/i.test(navigator.userAgent)?"📲 SMS (Phone)":"📲 SMS"}
        </button>
        <button class="btn sm sendViaBtn ghost" data-via="gmessages" id="viaGmsgBtnGrp"
          style="${/Mobi|Android|iPhone/i.test(navigator.userAgent)?"display:none;":""}"
          title="Opens Google Messages on the web (messages.google.com)">
          💬 Google Messages
        </button>
        <button class="btn sm sendViaBtn ghost" data-via="whatsapp">💬 WhatsApp</button>
        <button class="btn sm sendViaBtn ghost" data-via="both">📲+💬 Both</button>
      </div>
      <div id="viaHintGrp" style="margin-top:6px;font-size:11px;color:var(--gray3);padding:5px 8px;background:var(--sky);border-radius:6px;display:none;"></div>
    </div>

    <!-- ③ FILTER / SEARCH recipients -->
    <div style="margin-bottom:8px;">
      <div style="font-weight:700;font-size:11px;color:var(--gray3);letter-spacing:.5px;margin-bottom:6px;">③ FILTER RECIPIENTS</div>
      <input id="msgSearch" placeholder="🔍 Search by name or number…"
        style="width:100%;padding:8px 11px;border:1px solid var(--gray1);border-radius:8px;font-size:13px;color:var(--dark);background:var(--white);">
    </div>

    <!-- Recipient list -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
      <span style="font-weight:700;font-size:11px;color:var(--gray3);letter-spacing:.5px;">RECIPIENTS <span id="msgRecipCount" style="font-weight:400;color:var(--gray2);"></span></span>
      <span style="font-size:12px;font-weight:400;cursor:pointer;color:var(--blue);" id="msgToggleAll">Deselect All</span>
    </div>
    <div id="msgRecipList" style="max-height:190px;overflow-y:auto;border:1px solid var(--gray1);border-radius:8px;padding:0 12px;margin-bottom:14px;">

    </div>

    <!-- Message body -->
    <div class="field">
      <label>Message <span id="msgCharCount" style="font-weight:400;color:var(--gray2);"></span></label>
      <textarea id="msgBody" rows="3" style="width:100%;padding:10px 12px;border:1px solid var(--gray1);border-radius:8px;
        font-family:inherit;font-size:14px;resize:vertical;" placeholder="Type your message here…"></textarea>
    </div>

    <!-- Auto-send settings -->
    <div style="background:var(--sky);border:1px solid var(--gray1);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12.5px;">
      <strong>🤖 Auto-Send:</strong> Opens each recipient's app one by one. Set delay to match how fast the app sends.
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12.5px;">
      <label style="font-weight:600;color:var(--gray3);white-space:nowrap;">⏱ Auto-advance:</label>
      <select id="msgAutoDelay" style="width:auto;padding:6px 10px;border:1px solid var(--gray1);border-radius:8px;font-size:13px;background:var(--white);">
        <option value="3000">3 seconds</option>
        <option value="4000" selected>4 seconds</option>
        <option value="5000">5 seconds</option>
        <option value="6000">6 seconds</option>
        <option value="8000">8 seconds</option>
        <option value="10000">10 seconds</option>
        <option value="0">Manual (no auto-advance)</option>
      </select>
    </div>

    <div id="msgSendButtons" style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn green block" id="btnMsgSendAll" ${allRecipients.length?"":'disabled'}>
        ▶️ Start Auto-Send
      </button>
      <button class="btn ghost block" id="btnMsgCopyNums">📋 Copy Selected Numbers</button>
    </div>

    <!-- Auto-send progress panel -->
    <div id="msgAutoSendPanel" style="display:none;margin-top:14px;">
      <div id="msgAutoProgress" style="background:var(--white);border:2px solid var(--blue);border-radius:10px;padding:14px 16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="font-weight:700;font-size:13px;color:var(--blue);">📤 Auto-Sending</span>
          <span id="msgAutoCounter" style="font-size:12px;color:var(--gray3);font-weight:600;"></span>
        </div>
        <div style="background:var(--gray1);border-radius:999px;height:8px;margin-bottom:12px;overflow:hidden;">
          <div id="msgAutoBar" style="height:100%;background:var(--blue);border-radius:999px;transition:width .4s;width:0%;"></div>
        </div>
        <div id="msgAutoCurrent" style="background:var(--sky);border:1px solid var(--gray1);border-radius:8px;padding:12px 14px;margin-bottom:10px;text-align:center;"></div>
        <div id="msgAutoCountdownWrap" style="display:none;margin-bottom:8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:11.5px;color:var(--gray3);font-weight:600;">⏳ Auto-advancing in <span id="msgAutoCountdownNum" style="color:var(--blue);font-weight:700;"></span>s…</span>
            <span style="font-size:11px;color:var(--gray2);">or tap a button below</span>
          </div>
          <div style="background:var(--gray1);border-radius:999px;height:5px;overflow:hidden;">
            <div id="msgAutoCountdownBar" style="height:100%;background:var(--blue);border-radius:999px;width:100%;"></div>
          </div>
        </div>
        <div id="msgAutoActions" style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn green" id="btnAutoNext" style="flex:1;">📱 Open &amp; Next</button>
          <button class="btn ghost" id="btnAutoSkip" style="flex:none;">⏭ Skip</button>
          <button class="btn red" id="btnAutoStop" style="flex:none;">⏹ Stop</button>
        </div>
        <div id="msgAutoDone" style="display:none;text-align:center;padding:10px 0;">
          <div style="font-size:22px;margin-bottom:6px;">✅</div>
          <div style="font-weight:700;color:var(--green);font-size:14px;">All recipients done!</div>
          <div id="msgAutoDoneSummary" style="font-size:12px;color:var(--gray3);margin-top:4px;"></div>
        </div>
      </div>
      <div id="msgAutoLog" style="margin-top:10px;max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;"></div>
    </div>
  `);

  // ── State ────────────────────────────────────────────────────────
  let currentTypeFilter="all";
  let currentVia="sms";
  let currentSearch="";
  let toggleAllChecked=true;

  // Track manually unchecked phone numbers so refreshes preserve user selections
  const uncheckedPhones=new Set();

  function updateRecipCount(){
    const count=body.querySelectorAll(".msgRecip").length;
    const checked=body.querySelectorAll(".msgRecip:checked").length;
    body.querySelector("#msgRecipCount").textContent=`(${checked} / ${count} selected)`;
  }

  function refreshRecipList(){
    // Capture current unchecked state before rebuilding
    body.querySelectorAll(".msgRecip").forEach(cb=>{
      if(!cb.checked) uncheckedPhones.add(cb.dataset.raw);
      else uncheckedPhones.delete(cb.dataset.raw);
    });
    body.querySelector("#msgRecipList").innerHTML=buildRecipientRows(currentTypeFilter,currentSearch);
    // Restore unchecked state
    body.querySelectorAll(".msgRecip").forEach(cb=>{
      if(uncheckedPhones.has(cb.dataset.raw)) cb.checked=false;
    });
    // Re-attach change listeners
    body.querySelectorAll(".msgRecip").forEach(cb=>{
      cb.onchange=()=>{
        if(!cb.checked) uncheckedPhones.add(cb.dataset.raw);
        else uncheckedPhones.delete(cb.dataset.raw);
        updateRecipCount();
      };
    });
    const allCount=body.querySelectorAll(".msgRecip").length;
    const checkedCount=body.querySelectorAll(".msgRecip:checked").length;
    toggleAllChecked=checkedCount===allCount;
    body.querySelector("#msgToggleAll").textContent=toggleAllChecked?"Deselect All":"Select All";
    updateRecipCount();
  }
  refreshRecipList();

  // ── ① Type filter buttons ────────────────────────────────────────
  body.querySelectorAll(".sendToBtn").forEach(btn=>{
    btn.onclick=()=>{
      currentTypeFilter=btn.dataset.filter;
      body.querySelectorAll(".sendToBtn").forEach(b=>{
        b.classList.remove("active");
        b.style.background="var(--white)";
        b.style.color="var(--dark)";
        b.style.border="1px solid var(--gray1)";
      });
      btn.style.background="var(--blue)";
      btn.style.color="#fff";
      btn.style.border="1px solid var(--blue)";
      refreshRecipList();
    };
  });

  // ── ② Via (platform) buttons ────────────────────────────────────
  const viaHintGrp=body.querySelector("#viaHintGrp");
  const isMobileDevice=/Mobi|Android|iPhone/i.test(navigator.userAgent);
  // Set initial hint
  if(!isMobileDevice){
    currentVia="gmessages";
    body.querySelector("#viaGmsgBtnGrp").style.background="#1a73e8";
    body.querySelector("#viaGmsgBtnGrp").style.color="#fff";
    body.querySelector("#viaSmsBtnGrp").style.background="var(--white)";
    body.querySelector("#viaSmsBtnGrp").style.color="var(--dark)";
    body.querySelector("#viaSmsBtnGrp").style.border="1px solid var(--gray1)";
    if(viaHintGrp){ viaHintGrp.style.display="block"; viaHintGrp.textContent="💡 Desktop/Tablet detected — Google Messages will open in your browser. Sign in at messages.google.com first."; }
  } else {
    if(viaHintGrp){ viaHintGrp.style.display="block"; viaHintGrp.textContent="📱 Phone detected — SMS will open your native messaging app automatically."; }
  }
  body.querySelectorAll(".sendViaBtn").forEach(btn=>{
    btn.onclick=()=>{
      currentVia=btn.dataset.via;
      body.querySelectorAll(".sendViaBtn").forEach(b=>{
        b.classList.remove("active");
        b.style.background="var(--white)";
        b.style.color="var(--dark)";
        b.style.border="1px solid var(--gray1)";
      });
      const colorMap={whatsapp:"#25d366",both:"var(--orange)",gmessages:"#1a73e8",sms:"var(--blue)"};
      btn.style.background=colorMap[currentVia]||"var(--blue)";
      btn.style.color="#fff";
      btn.style.border="none";
      if(viaHintGrp){
        const hints={
          sms: isMobileDevice?"📱 Opens your native SMS app for each recipient.":"📲 SMS (on desktop this will open Google Messages as fallback).",
          gmessages:"💬 Opens messages.google.com in your browser — make sure you're signed in.",
          whatsapp:"💬 Opens WhatsApp Web (or app) for each recipient.",
          both: isMobileDevice?"📲+💬 Opens WhatsApp then native SMS for each recipient.":"📲+💬 Opens WhatsApp and Google Messages for each recipient."
        };
        viaHintGrp.style.display="block";
        viaHintGrp.textContent=hints[currentVia]||"";
      }
    };
  });

  // ── ③ Search filter ─────────────────────────────────────────────
  body.querySelector("#msgSearch").oninput=function(){
    currentSearch=this.value.trim();
    refreshRecipList();
  };

  // ── Character counter ────────────────────────────────────────────
  const textarea=body.querySelector("#msgBody");
  const counter=body.querySelector("#msgCharCount");
  textarea.oninput=()=>{
    const len=textarea.value.length;
    counter.textContent=`(${len} char${len!==1?"s":""})`;
  };

  // ── Toggle All ───────────────────────────────────────────────────
  body.querySelector("#msgToggleAll").onclick=function(){
    toggleAllChecked=!toggleAllChecked;
    body.querySelectorAll(".msgRecip").forEach(cb=>{
      cb.checked=toggleAllChecked;
      if(toggleAllChecked) uncheckedPhones.delete(cb.dataset.raw);
      else uncheckedPhones.add(cb.dataset.raw);
    });
    this.textContent=toggleAllChecked?"Deselect All":"Select All";
    updateRecipCount();
  };

  // ── Copy numbers ─────────────────────────────────────────────────
  body.querySelector("#btnMsgCopyNums").onclick=()=>{
    const checked=Array.from(body.querySelectorAll(".msgRecip:checked")).map(cb=>cb.dataset.raw);
    if(!checked.length){ toast("No recipients selected.", false); return; }
    const text=checked.join(", ");
    function doCopy(){
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;z-index:9999;font-size:14px;padding:8px;border:2px solid var(--blue);border-radius:8px;";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand("copy"); toast("📋 Copied "+checked.length+" number"+(checked.length!==1?"s":"")+"!"); }
      catch(e){ toast("Press Ctrl+C / Cmd+C to copy the selected numbers.",false); }
      setTimeout(()=>ta.remove(), 2500);
    }
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(text).then(()=>toast("📋 Copied "+checked.length+" number"+(checked.length!==1?"s":"")+"!")).catch(doCopy);
    } else { doCopy(); }
  };

  // ── Open link helper ─────────────────────────────────────────────
  function openForRecipient(r, msg, via){
    const phone=r.phone; // already cleaned digits
    const isMobile=/Mobi|Android|iPhone/i.test(navigator.userAgent);
    function openLink(url, newTab){
      const a=document.createElement("a");
      a.href=url;
      if(newTab){ a.target="_blank"; a.rel="noopener"; }
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    if(via==="gmessages"){
      // Google Messages Web — correct URL format
      openLink(`https://messages.google.com/web/conversations/new`,true);
      // Copy number+message so user can paste
      navigator.clipboard.writeText(`${r.raw}\n\n${msg}`).catch(()=>{});
      toast("💬 Google Messages opened — number copied to clipboard!",true,4000);
    } else if(via==="whatsapp"){
      openLink(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,true);
    } else if(via==="sms"){
      if(isMobile){
        openLink(`sms:${phone}?body=${encodeURIComponent(msg)}`,false);
      } else {
        openLink(`https://messages.google.com/web/conversations/new`,true);
        navigator.clipboard.writeText(`${r.raw}\n\n${msg}`).catch(()=>{});
        toast("💡 Google Messages opened — number copied to clipboard!",true,4000);
      }
    } else {
      // both
      openLink(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,true);
      setTimeout(()=>{
        if(isMobile) openLink(`sms:${phone}?body=${encodeURIComponent(msg)}`,false);
        else { openLink(`https://messages.google.com/web/conversations/new`,true); navigator.clipboard.writeText(`${r.raw}\n\n${msg}`).catch(()=>{}); }
      },600);
    }
  }

  // ── Auto-send engine ─────────────────────────────────────────────
  let autoQueue=[], autoIndex=0, autoSentCount=0, autoSkippedCount=0;
  let autoCountdownTimer=null, autoCountdownInterval=null;

  function copyToClipboard(text){
    return navigator.clipboard.writeText(text).catch(()=>{
      const ta=document.createElement("textarea");
      ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
    });
  }
  function clearAutoCountdown(){
    if(autoCountdownTimer){ clearTimeout(autoCountdownTimer); autoCountdownTimer=null; }
    if(autoCountdownInterval){ clearInterval(autoCountdownInterval); autoCountdownInterval=null; }
    const wrap=body.querySelector("#msgAutoCountdownWrap");
    if(wrap) wrap.style.display="none";
  }
  function startAutoCountdown(delayMs, onDone){
    clearAutoCountdown();
    if(!delayMs) return;
    const wrap=body.querySelector("#msgAutoCountdownWrap");
    const numEl=body.querySelector("#msgAutoCountdownNum");
    const bar=body.querySelector("#msgAutoCountdownBar");
    if(!wrap) return;
    wrap.style.display="block";
    const start=Date.now(); const end=start+delayMs;
    function tick(){
      const remaining=Math.max(0,end-Date.now());
      if(numEl) numEl.textContent=Math.ceil(remaining/1000);
      const pct=(remaining/delayMs)*100;
      if(bar){ bar.style.transition="none"; bar.style.width=pct+"%"; }
    }
    tick();
    autoCountdownInterval=setInterval(tick,200);
    autoCountdownTimer=setTimeout(()=>{ clearAutoCountdown(); onDone(); },delayMs);
  }
  function updateAutoUI(){
    const total=autoQueue.length;
    const pct=total?Math.round((autoIndex/total)*100):0;
    body.querySelector("#msgAutoBar").style.width=pct+"%";
    body.querySelector("#msgAutoCounter").textContent=`${autoIndex} / ${total}`;
    if(autoIndex>=total){
      clearAutoCountdown();
      body.querySelector("#msgAutoActions").style.display="none";
      body.querySelector("#msgAutoDone").style.display="block";
      body.querySelector("#msgAutoDoneSummary").textContent=`${autoSentCount} sent · ${autoSkippedCount} skipped`;
      body.querySelector("#msgAutoCurrent").innerHTML=`<span style="color:var(--green);font-weight:700;">🎉 All ${total} done!</span>`;
      body.querySelector("#msgAutoBar").style.background="var(--green)";
      body.querySelector("#btnMsgSendAll").disabled=false;
      body.querySelector("#btnMsgSendAll").textContent="🔄 Restart";
      return;
    }
    const r=autoQueue[autoIndex];
    const isMobile=/Mobi|Android|iPhone/i.test(navigator.userAgent);
    const msg=body.querySelector("#msgBody").value.trim();
    // Build the direct link for this recipient
    let linkHref="", linkLabel="", linkColor="var(--blue)";
    if(currentVia==="gmessages"||(!isMobile&&currentVia==="sms")){
      linkHref=`https://messages.google.com/web/conversations/new`;
      linkLabel="💬 Open Google Messages";
      linkColor="#1a73e8";
    } else if(currentVia==="whatsapp"){
      linkHref=`https://wa.me/${r.phone}?text=${encodeURIComponent(msg)}`;
      linkLabel="💬 Open WhatsApp";
      linkColor="#25d366";
    } else {
      // sms on mobile
      linkHref=`sms:${r.phone}?body=${encodeURIComponent(msg)}`;
      linkLabel="📲 Open SMS";
      linkColor="var(--blue)";
    }
    const gmNote=(currentVia==="gmessages"||((!isMobile)&&currentVia==="sms"))?
      `<div style="font-size:11px;color:var(--gray3);margin-top:6px;">Number copied to clipboard — paste into Google Messages</div>`:"";
    body.querySelector("#msgAutoCurrent").innerHTML=`
      <div style="font-size:11px;color:var(--gray3);margin-bottom:6px;font-weight:700;letter-spacing:.4px;">RECIPIENT ${autoIndex+1} of ${total}</div>
      <div style="font-size:15px;font-weight:700;color:var(--dark);">${escapeHtml(r.name)}</div>
      <div class="mono" style="font-size:13px;color:var(--blue);margin:3px 0 8px;">${escapeHtml(r.raw)}</div>
      <a href="${linkHref}" ${currentVia!=="sms"||!isMobile?'target="_blank" rel="noopener"':''} 
        onclick="navigator.clipboard.writeText('${r.raw.replace(/'/g,"\\'")}').catch(()=>{})"
        style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:${linkColor};color:#fff;border-radius:8px;font-weight:700;font-size:13.5px;text-decoration:none;">
        ${linkLabel}
      </a>
      ${gmNote}`;
  }
  async function sendCurrentAndAdvance(skip=false){
    if(autoIndex>=autoQueue.length) return;
    clearAutoCountdown();
    const r=autoQueue[autoIndex];
    const delayMs=parseInt(body.querySelector("#msgAutoDelay").value)||0;
    if(!skip){
      const msg=textarea.value.trim();
      const isMobile=/Mobi|Android|iPhone/i.test(navigator.userAgent);
      // Trigger the link in the UI panel (most reliable — user-initiated)
      const linkEl=body.querySelector("#msgAutoCurrent a");
      if(linkEl){ linkEl.click(); }
      else { openForRecipient(r, msg, currentVia); }
      autoSentCount++;
      const logItem=document.createElement("div");
      logItem.style.cssText="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--success);border:1px solid var(--green);border-radius:7px;font-size:12.5px;";
      logItem.innerHTML=`<span style="color:var(--green);font-size:15px;">✅</span>
        <span style="flex:1;font-weight:600;">${escapeHtml(r.name)}</span>
        <span class="mono" style="color:var(--gray3);">${escapeHtml(r.raw)}</span>
        <span class="pill ok" style="font-size:10px;">Sent</span>`;
      body.querySelector("#msgAutoLog").prepend(logItem);
    } else {
      autoSkippedCount++;
      const logItem=document.createElement("div");
      logItem.style.cssText="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--warn);border:1px solid var(--yellow);border-radius:7px;font-size:12.5px;";
      logItem.innerHTML=`<span style="color:var(--yellow);font-size:15px;">⏭</span>
        <span style="flex:1;font-weight:600;">${escapeHtml(r.name)}</span>
        <span class="mono" style="color:var(--gray3);">${escapeHtml(r.raw)}</span>
        <span class="pill" style="background:var(--warn);color:var(--yellow);font-size:10px;">Skipped</span>`;
      body.querySelector("#msgAutoLog").prepend(logItem);
    }
    autoIndex++;
    updateAutoUI();
    if(autoIndex<autoQueue.length && delayMs>0){
      startAutoCountdown(delayMs,()=>sendCurrentAndAdvance(false));
    }
  }
  async function startAutoSend(){
    const msg=textarea.value.trim();
    if(!msg){ toast("Please type a message first.", false); textarea.focus(); return; }
    const checked=Array.from(body.querySelectorAll(".msgRecip:checked"));
    if(!checked.length){ toast("Select at least one recipient.", false); return; }
    autoQueue=checked.map(cb=>({phone:cb.dataset.phone,raw:cb.dataset.raw,label:cb.dataset.label,name:cb.dataset.name||cb.dataset.raw}));
    autoIndex=0; autoSentCount=0; autoSkippedCount=0;
    body.querySelector("#msgAutoSendPanel").style.display="block";
    body.querySelector("#btnMsgSendAll").disabled=true;
    body.querySelector("#msgAutoActions").style.display="flex";
    body.querySelector("#msgAutoDone").style.display="none";
    body.querySelector("#msgAutoLog").innerHTML="";
    body.querySelector("#msgAutoBar").style.background="var(--blue)";
    updateAutoUI();
    body.querySelector("#msgAutoSendPanel").scrollIntoView({behavior:"smooth",block:"nearest"});
    const viaLabel=currentVia==="whatsapp"?"WhatsApp":currentVia==="both"?"SMS + WhatsApp":currentVia==="gmessages"?"Google Messages":"SMS";
    toast(`▶️ Auto-send started via ${viaLabel} — ${autoQueue.length} recipients queued.`);
    await sendCurrentAndAdvance(false);
  }
  body.querySelector("#btnMsgSendAll").onclick=startAutoSend;
  body.querySelector("#btnAutoNext").onclick=()=>{ clearAutoCountdown(); sendCurrentAndAdvance(false); };
  body.querySelector("#btnAutoSkip").onclick=()=>{ clearAutoCountdown(); sendCurrentAndAdvance(true); };
  body.querySelector("#btnAutoStop").onclick=()=>{
    clearAutoCountdown();
    autoQueue=[]; autoIndex=0;
    body.querySelector("#msgAutoSendPanel").style.display="none";
    body.querySelector("#btnMsgSendAll").disabled=false;
    body.querySelector("#btnMsgSendAll").textContent="▶️ Start Auto-Send";
    toast("⏹ Auto-send stopped.");
  };
}

/* ── Groups panel ───────────────────────────────────────────────── */
function panelAdminGroups(main){
  const sids=Object.keys(DB.students);

  // collect distinct years and sections
  const yearSet=new Set(), sectionSet=new Set();
  sids.forEach(sid=>{ const s=DB.students[sid];
    if(s.year) yearSet.add(s.year);
    if(s.section) sectionSet.add(s.section);
  });
  const years=[...yearSet].sort();
  const sections=[...sectionSet].sort();

  // build group map: year+section → students
  function buildGroups(filterYear, filterSection){
    const groups={};
    sids.forEach(sid=>{
      const s=DB.students[sid];
      const yr=s.year||"(No Grade)";
      const sec=s.section||"(No Section)";
      if(filterYear && yr!==filterYear) return;
      if(filterSection && sec!==filterSection) return;
      const key=yr+" — "+sec;
      if(!groups[key]) groups[key]={year:yr,section:sec,students:[]};
      groups[key].students.push({sid,...s});
    });
    return groups;
  }

  function renderGroups(){
    const fy=$("#gFilterYear").value;
    const fs=$("#gFilterSection").value;
    const groups=buildGroups(fy,fs);
    const keys=Object.keys(groups).sort();
    const container=$("#groupsContainer");
    if(!keys.length){
      container.innerHTML=`<div class="card pad muted" style="text-align:center;padding:30px;">No students match this filter.</div>`;
      return;
    }
    container.innerHTML=keys.map(key=>{
      const g=groups[key];
      const rows=g.students.map(s=>`
        <tr><td class="mono">${escapeHtml(s.sid)}</td><td>${escapeHtml(s.name)}</td>
        <td>${escapeHtml(s.course||"—")}</td>
        <td>${escapeHtml(s.phone||"—")}</td>
        <td>${escapeHtml(s.emergencyContact||"—")}</td>
        <td>${escapeHtml(s.emergencyPhone||"—")}</td>
        <td class="center">${computeGPA(s.grades).toFixed(2)}</td>
        <td class="center"><button class="btn orange sm" data-gsid="${escapeHtml(s.sid)}">✏️ Edit</button></td></tr>`).join("");
      return `<div class="card" style="margin-bottom:18px;">
        <div style="padding:12px 16px;background:var(--navy);border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div style="color:#fff;font-weight:700;font-size:14px;">📚 ${escapeHtml(g.year)} &nbsp;·&nbsp; ${escapeHtml(g.section)}</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="pill ok">${g.students.length} student${g.students.length!==1?"s":""}</span>
            <button class="btn sm" style="background:#25d366;color:#fff;" data-msggroup="${escapeHtml(key)}">💬 Message Group</button>
          </div>
        </div>
        <div class="tbl-wrap" style="border-radius:0 0 var(--radius) var(--radius);border:none;max-height:300px;">
          <table class="tbl"><thead><tr><th>ID</th><th>Name</th><th>Course</th><th>Phone</th><th>Emergency Contact</th><th>Emerg. Phone</th><th>GPA</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
      </div>`;
    }).join("");
    container.querySelectorAll('[data-gsid]').forEach(b=>b.onclick=()=>dlgEditStudent(b.dataset.gsid));
    container.querySelectorAll('[data-msggroup]').forEach(b=>b.onclick=()=>{
      const grpKey=b.dataset.msggroup;
      const g=groups[grpKey];
      if(g) dlgMessageGroup(g);
    });
  }

  main.appendChild(el(`
    <div class="panel">
      <div class="row-between">
        <div><h1>Groups</h1><p class="lede">Students grouped by grade level and section.</p></div>
        <button class="btn green" id="btnAssignGroup">✏️ Assign Student Group</button>
      </div>
      <div class="card pad" style="margin-bottom:18px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;">
        <div class="field" style="margin:0;flex:1;min-width:140px;">
          <label style="font-size:12px;font-weight:700;color:var(--gray3);">Filter by Year</label>
          <select id="gFilterYear" style="margin-top:4px;">
            <option value="">All Grades</option>
            ${years.map(y=>`<option value="${escapeHtml(y)}">${escapeHtml(y)}</option>`).join("")}
          </select>
        </div>
        <div class="field" style="margin:0;flex:1;min-width:140px;">
          <label style="font-size:12px;font-weight:700;color:var(--gray3);">Filter by Section</label>
          <select id="gFilterSection" style="margin-top:4px;">
            <option value="">All Sections</option>
            ${sections.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("")}
          </select>
        </div>
      </div>
      <div id="groupsContainer"></div>
    </div>`));

  $("#gFilterYear").onchange=renderGroups;
  $("#gFilterSection").onchange=renderGroups;
  renderGroups();

  $("#btnAssignGroup").onclick=()=>{
    const body=openModal("Assign Student to Group", `
      <p class="modal-help">Update a student's grade level and section.</p>
      <div class="field"><label>Student</label>
        <select id="agSid">
          <option value="">— choose a student —</option>
          ${sids.map(sid=>`<option value="${sid}">${escapeHtml(sid)} — ${escapeHtml(DB.students[sid].name)}</option>`).join("")}
        </select>
      </div>
      <div class="two-col">
        <div class="field"><label>Grade Level</label><input id="agYear" placeholder="e.g. Grade 7"></div>
        <div class="field"><label>Section</label><input id="agSection" placeholder="e.g. Section A"></div>

      body.querySelector("#agSection").value=s.section||"";

      const sec=body.querySelector("#agSection").value.trim();
      DB.students[sid].year=yr;
      DB.students[sid].section=sec;
      saveDB(); closeModal(); showAdminPanel("groups");
      toast(`✅ ${DB.students[sid].name} assigned to ${yr} — ${sec}`);
    };
  };
}

/* ── Grades panel ───────────────────────────────────────────────── */
function panelAdminGrades(main){
  const allSids=Object.keys(DB.students);
  if(!STATE.gradeSid) STATE.gradeSid=null;

  function getStudentSubjects(sid){
    if(!sid) return [];
    // 1. Subjects already graded
    const graded=Object.keys(DB.students[sid]?.grades||{});
    // 2. Subjects from all teachers where student is enrolled
    const fromTeachers=[];
    Object.values(DB.teachers||{}).forEach(t=>{
      (t.subjects||[]).forEach(subj=>{
        if((subj.enrolledSids||[]).includes(sid)) fromTeachers.push(subj.name);
      });
      // also legacy assignedStudents
      if((t.assignedStudents||[]).includes(sid) && t.subject) fromTeachers.push(t.subject);
    });
    return [...new Set([...graded,...fromTeachers])].sort();
  }

  function renderPanel(){
    main.innerHTML="";
    const sid=STATE.gradeSid;
    const s=sid?DB.students[sid]:null;
    const subjects=getStudentSubjects(sid);
    const gpa=s?computeGPA(s.grades):0;
    const gpaColor=gpa>=3.5?"var(--green)":gpa>=2.5?"var(--blue)":gpa>=1.5?"var(--orange)":"var(--red)";

    // Build subject grade cards
    const subjectCardsHtml=subjects.length&&s?subjects.map(subj=>{
      const g=s.grades?.[subj];
      const hasGrade=!!g;
      const gradeColor=hasGrade?(g.score>=90?"var(--green)":g.score>=80?"var(--blue)":g.score>=75?"var(--orange)":"var(--red)"):"var(--gray2)";
      return `<div class="card pad" style="margin-bottom:10px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div style="flex:1;">
            <div style="font-weight:700;font-size:14px;color:var(--navy);margin-bottom:8px;">📚 ${escapeHtml(subj)}</div>
            ${hasGrade?`
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
              ${QUARTERS.map((k,i)=>`<div style="text-align:center;background:var(--gray0);border:1px solid var(--gray1);border-radius:8px;padding:6px 12px;min-width:52px;">
                <div style="font-size:11px;color:var(--gray3);font-weight:700;">Q${i+1}</div>
                <div style="font-size:16px;font-weight:800;color:${g[k]!==null&&g[k]!==undefined?"var(--dark)":"var(--gray2)"};">${fq(g[k])}</div>
              </div>`).join("")}
              <div style="text-align:center;background:${gradeColor};border-radius:8px;padding:6px 14px;min-width:64px;">
                <div style="font-size:11px;color:rgba(255,255,255,.85);font-weight:700;">FINAL</div>
                <div style="font-size:18px;font-weight:900;color:#fff;">${g.letter}</div>
                <div style="font-size:10px;color:rgba(255,255,255,.8);">${g.score.toFixed(1)}</div>
              </div>
            </div>
            <div style="font-size:11px;color:var(--gray2);">Last updated: ${g.date||"—"}</div>`
            :`<div style="font-size:13px;color:var(--gray2);font-style:italic;">No grades entered yet.</div>`}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;flex:none;">
            <button class="btn sm ${hasGrade?"orange":"green"} btnEditSubjGrade" data-subj="${escapeHtml(subj)}">
              ${hasGrade?"✏️ Edit":"+ Add Grade"}
            </button>
            ${hasGrade?`<button class="btn sm red btnDelSubjGrade" data-subj="${escapeHtml(subj)}">🗑 Remove</button>`:""}
          </div>
        </div>
      </div>`;
    }).join(""):"";

    main.appendChild(el(`
      <div class="panel">
        <div class="row-between">
          <div><h1>📝 Manage Grades</h1>
            <p class="lede" style="margin:0;">View and edit Q1–Q4 grades per subject for each student.</p>

            <div style="flex:1;min-width:200px;">
              <label style="font-size:12px;font-weight:700;color:var(--gray3);display:block;margin-bottom:5px;">SELECT STUDENT</label>
              <select id="gradeSidSelect" style="width:100%;padding:9px 11px;border:1px solid var(--gray1);border-radius:8px;font-size:13.5px;background:var(--white);">
                <option value="">— choose a student —</option>
                ${allSids.map(id=>`<option value="${id}" ${STATE.gradeSid===id?"selected":""}>${escapeHtml(id)} — ${escapeHtml(DB.students[id].name)}</option>`).join("")}
              </select>
            </div>
            ${s?`<div style="display:flex;gap:10px;flex-wrap:wrap;">
              <div class="stat" style="min-width:80px;"><div class="num" style="color:${gpaColor};">${gpa.toFixed(2)}</div><div class="lab">GPA</div></div>
              <div class="stat" style="min-width:80px;"><div class="num">${subjects.length}</div><div class="lab">Subjects</div></div>

              <div style="font-size:36px;margin-bottom:10px;">📝</div>
              <div style="font-weight:700;color:var(--navy);margin-bottom:6px;">No subjects found</div>
              <p class="muted" style="margin:0 0 14px;">This student has no enrolled subjects yet. Add a grade directly below.</p>
              <button class="btn green" id="btnAddNewSubjGrade2">+ Add Subject Grade</button>
            </div>`}
          </div>
        `:`<div class="card pad muted" style="text-align:center;padding:30px;">Select a student above to manage their grades.</div>`}
      </div>`));

    // Student picker change
    $("#gradeSidSelect").onchange=(e)=>{ STATE.gradeSid=e.target.value||null; renderPanel(); };

    // Add new subject grade
    const addBtn=main.querySelector("#btnAddNewSubjGrade")||main.querySelector("#btnAddNewSubjGrade2");
    if(addBtn) addBtn.onclick=()=>dlgAdminGrade(sid,null,subjects,renderPanel);

    // Per-subject edit buttons
    main.querySelectorAll(".btnEditSubjGrade").forEach(btn=>{
      btn.onclick=()=>dlgAdminGrade(sid,btn.dataset.subj,subjects,renderPanel);
    });

    // Per-subject delete buttons
    main.querySelectorAll(".btnDelSubjGrade").forEach(btn=>{
      btn.onclick=()=>{
        const subj=btn.dataset.subj;
        confirmDialog("Remove Grade",`Remove grade for "${subj}" from ${s.name}?`,()=>{
          delete DB.students[sid].grades[subj];
          saveDB(); renderPanel();
          toast(`🗑 Grade for "${subj}" removed.`,false);
        });
      };
    });
  }

  renderPanel();
}

/* ── Admin: Grade add/edit dialog (per subject, Q1–Q4) ──────────── */
function dlgAdminGrade(sid, existingSubj, knownSubjects, onSave){
  if(!sid){ toast("Select a student first.",false); return; }
  const s=DB.students[sid];
  const grades=s.grades;
  const g=existingSubj?grades[existingSubj]:null;
  const isEdit=!!existingSubj;

  // Subjects dropdown: known subjects + free input
  const subjOptions=(knownSubjects||[]).filter(sj=>sj!==existingSubj)
    .map(sj=>`<option value="${escapeHtml(sj)}">${escapeHtml(sj)}</option>`).join("");

  const body=openModal(isEdit?`✏️ Edit Grade — ${escapeHtml(existingSubj)}`:`+ Add Grade — ${escapeHtml(s.name)}`,`
    <p class="modal-help" style="margin-bottom:14px;">Enter scores for each quarter (0–100). Leave blank if not yet recorded.<br>Final grade is automatically computed as the average of entered quarters.</p>

    <div class="field">
      <label>Subject</label>
      ${isEdit
        ?`<input id="gSubjInput" value="${escapeHtml(existingSubj)}" style="width:100%;padding:9px 12px;border:1px solid var(--gray1);border-radius:8px;font-size:14px;">`
        :`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <select id="gSubjSelect" style="flex:1;min-width:120px;padding:9px 11px;border:1px solid var(--gray1);border-radius:8px;font-size:13.5px;background:var(--white);">
              <option value="">— pick existing or type new —</option>
              ${subjOptions}
            </select>
            <span style="font-size:12px;color:var(--gray2);">or</span>
            <input id="gSubjInput" placeholder="Type new subject name" style="flex:1;min-width:120px;padding:9px 12px;border:1px solid var(--gray1);border-radius:8px;font-size:14px;">
          </div>`}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;">
      ${QUARTERS.map((k,i)=>`
        <div class="field" style="margin:0;">
          <label>Quarter ${i+1}</label>
          <input id="g_${k}" type="number" min="0" max="100" step="0.01"
            placeholder="0–100 or blank"
            value="${g&&g[k]!==null&&g[k]!==undefined?Math.round(g[k]*100)/100:""}"
            style="width:100%;padding:9px 12px;border:1px solid var(--gray1);border-radius:8px;font-size:14px;">
        </div>`).join("")}
    </div>

    <!-- Live preview -->
    <div id="gPreview" style="background:var(--sky);border:1px solid var(--lblue);border-radius:8px;padding:10px 14px;margin:12px 0;font-size:13px;display:none;">
      <span style="color:var(--gray3);font-weight:600;">Preview: </span>
      <span id="gPreviewText"></span>
    </div>

    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn ghost" id="gCancel" style="flex:none;">Cancel</button>
      <button class="btn green block" id="gSubmit">💾 Save Grade</button>
    </div>
  `);

  // If select changes, fill text input
  const sel=body.querySelector("#gSubjSelect");
  if(sel) sel.onchange=()=>{ if(sel.value) body.querySelector("#gSubjInput").value=sel.value; };

  // Live preview as scores are typed
  function updatePreview(){
    const q={};
    for(const k of QUARTERS){
      const raw=body.querySelector("#g_"+k).value.trim();
      q[k]=raw===""?null:parseFloat(raw);
    }
    const valid=QUARTERS.filter(k=>q[k]!==null&&!isNaN(q[k])&&q[k]>=0&&q[k]<=100);
    if(!valid.length){ body.querySelector("#gPreview").style.display="none"; return; }
    const avg=valid.reduce((s,k)=>s+q[k],0)/valid.length;
    const letter=scoreToLetter(avg);
    const color=avg>=90?"var(--green)":avg>=80?"var(--blue)":avg>=75?"var(--orange)":"var(--red)";
    body.querySelector("#gPreview").style.display="block";
    body.querySelector("#gPreviewText").innerHTML=
      `Final Score: <strong style="color:${color};">${avg.toFixed(2)}</strong> &nbsp;·&nbsp; Grade: <strong style="color:${color};font-size:16px;">${letter}</strong>
       &nbsp;·&nbsp; <span style="color:var(--gray3);">Based on ${valid.length} of 4 quarters</span>`;
  }
  QUARTERS.forEach(k=>{ body.querySelector("#g_"+k).oninput=updatePreview; });
  updatePreview();

  body.querySelector("#gCancel").onclick=closeModal;

  body.querySelector("#gSubmit").onclick=()=>{
    const subj=(body.querySelector("#gSubjInput").value.trim());
    if(!subj){ toast("Subject name is required.",false); return; }
    const q={};
    for(const k of QUARTERS){
      const raw=body.querySelector("#g_"+k).value.trim();
      if(raw===""){ q[k]=null; continue; }
      const v=parseFloat(raw);
      if(isNaN(v)||v<0||v>100){ toast(`Q${QUARTERS.indexOf(k)+1} must be 0–100 or blank.`,false); return; }
      q[k]=v;
    }
    if(QUARTERS.every(k=>q[k]===null)){ toast("Enter at least one quarter score.",false); return; }
    if(isEdit&&existingSubj!==subj) delete grades[existingSubj];
    const final=computeFinal(q);
    grades[subj]={...q,score:final,letter:scoreToLetter(final),date:todayStr()};
    saveDB(); closeModal();
    if(onSave) onSave();
    toast(`✅ ${escapeHtml(subj)}: ${final.toFixed(1)} — ${scoreToLetter(final)}`);
  };
}

/* legacy wrapper so existing callers still work */
function dlgAddGrade(existingSubj){

function renderGradesTable(){
  const body=$("#gradesBody"); if(!body) return;
  if(!STATE.gradeSid){
    body.innerHTML=`<tr class="empty-row"><td colspan="8">Select a student above to view grades.</td></tr>`;
    return;
  }
  const grades=DB.students[STATE.gradeSid].grades;
  const subjects=Object.keys(grades);
  if(!subjects.length){
    body.innerHTML=`<tr class="empty-row"><td colspan="8">No grades yet for this student.</td></tr>`;
    return;
  }
  body.innerHTML=subjects.map(subj=>{
    const g=grades[subj];

    return `<tr class="${sel}" data-subj="${escapeHtml(subj)}" style="cursor:pointer;">

  body.querySelectorAll("tr[data-subj]").forEach(tr=>{
    tr.onclick=()=>{ STATE.gradeSelSubj=tr.dataset.subj; renderGradesTable(); };

}

    fsids.forEach(sid=>(DB.attendance[sid]||[]).forEach(e=>{ if(e.date.startsWith(ym)) allDates.add(e.date); }));

    const headCells=sortedDates.map(d=>`<th style="text-align:center;min-width:44px;font-size:11px;">${d.slice(5)}</th>`).join("");
    const rows=fsids.map((sid,i)=>{

      const cells=sortedDates.map(d=>{
        const rec=getDailyRecord(sid,d);
        if(rec?.status==="Present"){ pCt++; return `<td class="center" style="background:#dcfce7;color:var(--green);font-size:12px;font-weight:700;">P</td>`; }

        return `<td class="center muted" style="font-size:11px;">—</td>`;

      const rate=sortedDates.length?Math.round(pCt/sortedDates.length*100)+"%":"—";
      return `<tr>

        <td class="mono" style="font-size:11.5px;">${escapeHtml(sid)}</td>
        <td style="font-weight:600;font-size:12px;">${escapeHtml(s.name)}</td>

        <td class="center"><span class="pill ${pCt/sortedDates.length>=0.75?"ok":"bad"}" style="font-size:10.5px;">${rate}</span></td>

    }).join("");
    wrap.innerHTML=`
      <div style="font-size:12px;color:var(--gray3);margin-bottom:8px;padding:0 4px;">Month: <strong>${ym}</strong> &nbsp;·&nbsp; School Days Recorded: <strong>${sortedDates.length}</strong></div>
