    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const a2=document.createElement("a"); a2.href=URL.createObjectURL(blob); a2.download=`daily_attendance_${date}.csv`;
    document.body.appendChild(a2); a2.click(); a2.remove();
    toast(`💾 Exported daily_attendance_${date}.csv`);
  };

  document.getElementById("btnDailyRangeExport").onclick=()=>{
    const fromVal=document.getElementById("dailyRangeFrom")?.value;
    const toVal=document.getElementById("dailyRangeTo")?.value;
    if(!fromVal||!toVal){ toast("Please select both From and To dates for range export.", false); return; }
    if(fromVal>toVal){ toast("'From' date must be before or equal to 'To' date.", false); return; }
    const fsids2=filterSids();
    // Collect all dates in range that have any record
    const allDates=new Set();
    fsids2.forEach(sid=>(DB.attendance[sid]||[]).forEach(e=>{ if(e.date>=fromVal&&e.date<=toVal) allDates.add(e.date); }));
    const sortedDates=[...allDates].sort();
    if(!sortedDates.length){ toast("No records found in selected date range.", false); return; }
    const rows=[["Student ID","Name","Grade","Section","Date","Time In","Status","Remarks"]];
    fsids2.forEach(sid=>{
      const s=DB.students[sid];
      sortedDates.forEach(date=>{
        const rec=getDailyRecord(sid,date);
        if(rec) rows.push([sid,s.name,s.year||"",s.section||"",date,rec.timeIn||"—",rec.status||"Not Marked",rec.remark||""]);
      });
    });
    if(rows.length<=1){ toast("No records found in selected date range.", false); return; }
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const a2=document.createElement("a"); a2.href=URL.createObjectURL(blob); a2.download=`daily_attendance_${fromVal}_to_${toVal}.csv`;
    document.body.appendChild(a2); a2.click(); a2.remove();
    toast(`💾 Exported daily attendance from ${fromVal} to ${toVal}`);
  };

  renderTable();
}

  function getAdminFilters(){
    return {

  function getSubjAtt(sid,date,subj){
    if(!DB.subjectAttendance||!DB.subjectAttendance[sid]) return null;
    return DB.subjectAttendance[sid][date+"||"+subj]||null;
  }

  function filterStudents(f){
    return sids.filter(sid=>{
      const s=DB.students[sid];
      if(f.year && (s.year||"")!==f.year) return false;
      if(f.section && (s.section||"")!==f.section) return false;
      if(f.teacher){
        const t=DB.teachers[f.teacher];
        if(!t||!t.assignedStudents||!t.assignedStudents.includes(sid)) return false;
      }
      return true;
    });
  }

    const rows=[["Student ID","Name","Grade","Section","Subject","Date","Time In","Status","Teacher","Remarks"]];
    if(DB.subjectAttendance){
      for(const sid in DB.subjectAttendance){
        const s=DB.students[sid]; if(!s) continue;
        // Apply year/section/teacher filters
        if(f2.year&&(s.year||"")!==f2.year) continue;
        if(f2.section&&(s.section||"")!==f2.section) continue;
        if(f2.teacher){
          const t=DB.teachers[f2.teacher];
          if(!t||!t.assignedStudents||!t.assignedStudents.includes(sid)) continue;

    if(fromVal>toVal){ toast("'From' date must be before 'To' date.", false); return; }
    const f2=getAdminFilters();
    if(!f2.subj){ toast("Please select a Subject filter first for SF2 export.", false); return; }
    // Build list of students who have records for this subject in range
    const allDates=new Set();
    const eligibleSids=[];
    if(DB.subjectAttendance){
      for(const sid in DB.subjectAttendance){
        const s=DB.students[sid]; if(!s) continue;
        if(f2.year&&(s.year||"")!==f2.year) continue;
        if(f2.section&&(s.section||"")!==f2.section) continue;
        let hasAny=false;
        for(const k of Object.keys(DB.subjectAttendance[sid]||{})){
          const parts=k.split("||");
          const d=parts[0], subj=parts[1];
          if(subj===f2.subj&&d>=fromVal&&d<=toVal){ allDates.add(d); hasAny=true; }
        }
        if(hasAny) eligibleSids.push(sid);
      }
    }
    const sortedDates=[...allDates].sort();
    if(!sortedDates.length){ toast("No SF2 records found for that subject in the date range.", false); return; }
    const header=["#","Student ID","Name","Grade","Section",...sortedDates.map(d=>d.slice(5)),"Days Present","Days Absent","Rate"];
    const csvRows=[header];
    eligibleSids.forEach((sid,i)=>{
      const s=DB.students[sid]; let pCt=0,aCt=0;
      const cells=sortedDates.map(d=>{
        const rec=DB.subjectAttendance?.[sid]?.[d+"||"+f2.subj];
        if(rec?.status==="Present"){ pCt++; return "P"; }
        if(rec?.status==="Absent"){ aCt++; return "A"; }
        return "";
      });
      const rate=sortedDates.length?Math.round(pCt/sortedDates.length*100)+"%":"—";
      csvRows.push([i+1,sid,s.name,s.year||"",s.section||"",...cells,pCt,aCt,rate]);
    });
    const csv=csvRows.map(r2=>r2.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const a2=document.createElement("a"); a2.href=URL.createObjectURL(blob);
    a2.download=`SF2_${f2.subj.replace(/\s+/g,"_")}_${fromVal}_to_${toVal}.csv`;
    document.body.appendChild(a2); a2.click(); a2.remove();
    toast("💾 SF2 exported: "+f2.subj+" ("+fromVal+" to "+toVal+")");
  };

  renderContent();
}

/* ── SF2 CSV Export ─────────────────────────────────────────────── */
function exportSF2Csv(sids, subj, ym, role){
  if(!subj){ toast("Select a subject first.", false); return; }
  const allDates=new Set();
  if(DB.subjectAttendance){
    sids.forEach(sid=>{
      const recs=DB.subjectAttendance[sid]||{};
      Object.keys(recs).forEach(k=>{ if(k.startsWith(ym)&&k.includes("||"+subj)) allDates.add(k.split("||")[0]); });
    });
  }
  const sortedDates=[...allDates].sort();
  const header=["#","Student ID","Name","Grade","Section",...sortedDates.map(d=>d.slice(5)),"Days Present","Days Absent","Rate"];
  const rows=[header];
  sids.forEach((sid,i)=>{
    const s=DB.students[sid]; let pCt=0,aCt=0;
    const cells=sortedDates.map(d=>{
      const rec=DB.subjectAttendance?.[sid]?.[d+"||"+subj];
      if(rec?.status==="Present"){ pCt++; return "P"; }
      if(rec?.status==="Absent"){ aCt++; return "A"; }
      return "";
    });
    const rate=sortedDates.length?Math.round(pCt/sortedDates.length*100)+"%":"—";
    rows.push([i+1,sid,s.name,s.year||"",s.section||"",...cells,pCt,aCt,rate]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`SF2_${subj.replace(/\s+/g,"_")}_${ym}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  toast(`💾 SF2 exported: SF2_${subj}_${ym}.csv`);
}

  const body=openModal("Manual Attendance Entry", `

function exportAttendanceCsv(){

    for(const sid in DB.subjectAttendance){

      rows.push([sid,s.name,s.course||"",s.year||"","(General)",e.date,e.timeIn||"—",e.status,"—",""]);

/* ════════════════════════════════════════════════════════════════
   QR CODE GENERATION  (uses embedded qrcode-generator library)
   ════════════════════════════════════════════════════════════════ */
function qrPayload(sid){
  return JSON.stringify({student_id: sid, name: DB.students[sid].name});
}
function qrGifDataURL(text){
  const qr = qrcode(0, "M");
  qr.addData(text);
  qr.make();
  return qr.createDataURL(6, 4);
}
function qrPngDataURL(text){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      canvas.width=img.naturalWidth||220; canvas.height=img.naturalHeight||220;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0);
      resolve(canvas.toDataURL("image/png"));
    };
    img.onerror=reject;
    img.src=qrGifDataURL(text);
  });
}
async function ensureQr(sid){
  if(!DB.qrcache) DB.qrcache={};
  if(!DB.qrcache[sid]){
    DB.qrcache[sid]=await qrPngDataURL(qrPayload(sid));
    saveDB();
  }
  return DB.qrcache[sid];
}
function downloadDataUrl(dataUrl, filename){
  const a=document.createElement("a");
  a.href=dataUrl; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
}

async function detectCameras(){
  const sel=$("#camSelect"); if(!sel) return;
  setScanStatus("🔍 Scanning for cameras…", "var(--gray3)");
  $("#btnStartScan").disabled=true;
  if(!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices){
    setScanStatus("❌ This browser does not support camera access.", "var(--red)");
    return;
  }
  try{
    // Enumerate without forcing a permission prompt yet — labels may read
    // generically ("Camera 1") until the user presses Start and grants access.
    const devices=await navigator.mediaDevices.enumerateDevices();
    const cams=devices.filter(d=>d.kind==="videoinput");
    sel.innerHTML = cams.map((c,i)=>`<option value="${c.deviceId}">${escapeHtml(c.label||"Camera "+(i+1))}</option>`).join("");
    if(!cams.length){
      setScanStatus("❌ No cameras found. Connect a webcam and click Refresh.", "var(--red)");
      return;
    }
    setScanStatus(`✅ Found ${cams.length} camera(s) — press ▶ Start Scanner`, "var(--green)");
    $("#btnStartScan").disabled=false;
  }catch(e){
    setScanStatus("❌ Could not access camera: " + e.message, "var(--red)");
  }
}
function setScanStatus(msg, color){
  const s=$("#scanStatus"); if(!s) return;
  s.textContent=msg; s.style.color=color||"var(--gray3)";
}
async function startScanner(){
  if(STATE.scanner.running) return;
  const deviceId=$("#camSelect").value;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video: deviceId ? {deviceId:{exact:deviceId}} : true
    });
    STATE.scanner.stream=stream;
    const wrap=$("#videoWrap");
    wrap.innerHTML=`<video id="scanVideo" autoplay playsinline muted></video>`;
    const video=$("#scanVideo");
    video.srcObject=stream;
    await video.play();
    STATE.scanner.running=true;
    $("#btnStartScan").disabled=true; $("#btnStopScan").disabled=false;
    $("#camSelect").disabled=true;
    setScanStatus("🎥 Scanning… hold QR code in front of camera", "var(--blue)");
    pollCamera(video);
  }catch(e){
    setScanStatus("❌ Could not open camera: " + e.message, "var(--red)");
  }
}
function pollCamera(video){
  if(!STATE.scanner.running) return;
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d", {willReadFrequently:true});
  function tick(){
    if(!STATE.scanner.running) return;
    if(video.readyState===video.HAVE_ENOUGH_DATA && video.videoWidth){
      canvas.width=video.videoWidth; canvas.height=video.videoHeight;
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      try{
        const img=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=jsQR(img.data, img.width, img.height);
        if(code && code.data) handleScan(code.data);
      }catch(e){ /* ignore frame errors */ }
    }
    STATE.scanner.raf=requestAnimationFrame(tick);
  }
  tick();
}
function stopScanner(){
  STATE.scanner.running=false;
  if(STATE.scanner.raf) cancelAnimationFrame(STATE.scanner.raf);
  STATE.scanner.raf=null;
  if(STATE.scanner.stream){
    STATE.scanner.stream.getTracks().forEach(t=>t.stop());
    STATE.scanner.stream=null;
  }
  const wrap=$("#videoWrap");
  if(wrap) wrap.innerHTML=`<div class="placeholder">Scanner stopped.</div>`;
  const startBtn=$("#btnStartScan"), stopBtn=$("#btnStopScan"), camSel=$("#camSelect");
  if(startBtn) startBtn.disabled=false;
  if(stopBtn) stopBtn.disabled=true;
  if(camSel) camSel.disabled=false;
  if($("#scanStatus")) setScanStatus("⏹ Scanner stopped — press Start to resume", "var(--gray3)");
}
function handleScan(data){
  let sid;
  try{ sid = (JSON.parse(data).student_id||"").trim(); }
  catch(e){ sid = data.trim(); }
  if(!sid || !DB.students[sid]){
    setScanStatus("❌ Unknown QR code — student not found", "var(--red)");
    return;
  }
  const now=Date.now();
  const last=STATE.scanner.lastScanned[sid]||0;
  if(now-last < 5000) return;
  STATE.scanner.lastScanned[sid]=now;

  const {action, entry, message} = scanAttendance(sid);
  const name=DB.students[sid].name;
  $("#scanName").textContent=`${name} (${sid})`;
  if(action==="in"){
    setScanStatus("✅ TIME IN recorded!", "var(--green)");
    $("#scanAction").textContent="🟢 Time In"; $("#scanTime").textContent=entry.timeIn;
  }else if(action==="out"){
    setScanStatus("✅ TIME OUT recorded!", "var(--blue)");
    $("#scanAction").textContent="🔵 Time Out"; $("#scanTime").textContent=entry.timeOut;
  }else{
    setScanStatus("⚠ "+message, "var(--orange)");
    $("#scanAction").textContent="Already complete"; $("#scanTime").textContent="—";
  }
}
function scanAttendance(sid){
  const today=todayStr(), now=timeStr();
  const ent=DB.attendance[sid]||(DB.attendance[sid]=[]);
  for(const e of ent){
    if(e.date===today){
      if(e.timeOut==="—"||!e.timeOut){
        e.timeOut=now; saveDB();
        return {action:"out", entry:e};
      }
      return {action:"error", message:"Already timed in and out today."};
    }
  }
  const entry={date:today, timeIn:now, timeOut:"—", status:"Present"};
  ent.push(entry); saveDB();
  return {action:"in", entry};
}

function dlgSendMessage(fromId, fromLabel, recipientSids){
  if(!DB.messages) DB.messages=[];
  const allSids=Object.keys(DB.students);
  const targets=(recipientSids||allSids).filter(sid=>DB.students[sid]);

  // Build recipient list from phone numbers (student + emergency)
  const allRecipients=[];
  const seen=new Set();
  targets.forEach(sid=>{
    const s=DB.students[sid];
    const add=(phone,label,name,studentName)=>{
      const cleaned=(phone||"").replace(/\D/g,"");
      if(!cleaned) return;
      const key=cleaned+"|"+label;
      if(seen.has(key)) return;
      seen.add(key);
      allRecipients.push({phone:cleaned,raw:phone,label,name,studentName,sid});
    };
    if(s.phone) add(s.phone,"Student",s.name,s.name);
    if(s.emergencyPhone) add(s.emergencyPhone,"Emergency",s.emergencyContact||s.name+" (Emergency)",s.name);
  });

  const hasStudentNums=allRecipients.some(r=>r.label==="Student");
  const hasEmergencyNums=allRecipients.some(r=>r.label==="Emergency");

  function buildRows(filter){
    const list=filter==="all"?allRecipients
      :filter==="student"?allRecipients.filter(r=>r.label==="Student")
      :allRecipients.filter(r=>r.label==="Emergency");
    if(!list.length) return `<div class="muted" style="padding:14px;text-align:center;">
      No ${filter==="emergency"?"emergency ":filter==="student"?"student ":""}phone numbers found.<br>
      <small>Add phone numbers to students via Admin → Students → Edit.</small></div>`;
    return list.map(r=>`
      <label style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray1);cursor:pointer;">
        <input type="checkbox" class="smgRecip" data-phone="${escapeHtml(r.phone)}" data-raw="${escapeHtml(r.raw)}"
          data-label="${escapeHtml(r.label)}" data-sid="${escapeHtml(r.sid)}" checked
          style="width:16px;height:16px;accent-color:var(--blue);flex:none;">
        <span style="flex:1;">
          <span style="font-weight:600;">${escapeHtml(r.name)}</span>
          <span class="pill ${r.label==="Student"?"ok":"warn"}" style="margin-left:6px;font-size:10px;">${r.label}</span>
          ${r.label==="Emergency"?`<span style="font-size:11px;color:var(--gray2);margin-left:4px;">for ${escapeHtml(r.studentName)}</span>`:""}
          <br><span class="muted mono" style="font-size:12px;">${escapeHtml(r.raw)}</span>
        </span>
      </label>`).join("");
  }

  const body=openModal(`💬 Send Message — ${escapeHtml(fromLabel)}`,`
    <p class="modal-help" style="margin-bottom:10px;">Compose a message. Auto-send opens the messaging app for each recipient one by one.</p>

    <div style="margin-bottom:12px;">
      <div style="font-weight:700;font-size:12px;color:var(--gray3);margin-bottom:6px;">① SEND VIA</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn sm smgViaBtn" data-via="sms" id="smgViaSmsBtnEl"
          style="${/Mobi|Android|iPhone/i.test(navigator.userAgent)?"background:var(--blue);color:#fff;":"background:var(--white);color:var(--dark);border:1px solid var(--gray1);"}">
          ${/Mobi|Android|iPhone/i.test(navigator.userAgent)?"📲 SMS (Phone)":"📲 SMS"}
        </button>
        <button class="btn sm smgViaBtn" data-via="gmessages" id="smgViaGmsgBtnEl"
          style="${/Mobi|Android|iPhone/i.test(navigator.userAgent)?"display:none;background:var(--white);color:var(--dark);border:1px solid var(--gray1);":"background:#1a73e8;color:#fff;"}">
          💬 Google Messages
        </button>
        <button class="btn sm smgViaBtn ghost" data-via="whatsapp">💬 WhatsApp</button>
      </div>
      <div id="smgViaHint" style="margin-top:6px;font-size:11px;color:var(--gray3);padding:5px 8px;background:var(--sky);border-radius:6px;"></div>
    </div>

    <div style="margin-bottom:12px;">
      <div style="font-weight:700;font-size:12px;color:var(--gray3);margin-bottom:6px;">② SEND TO</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn sm smgFilter active" data-filter="all" style="background:var(--blue);color:#fff;">👥 All Numbers</button>
        <button class="btn sm smgFilter ghost" data-filter="student" style="color:var(--green);border-color:var(--green);">📱 Student ${hasStudentNums?"":"(none)"}</button>
        <button class="btn sm smgFilter ghost" data-filter="emergency" style="color:var(--orange);border-color:var(--orange);">🚨 Emergency ${hasEmergencyNums?"":"(none)"}</button>
      </div>
    </div>

    <div style="font-weight:700;font-size:12px;color:var(--gray3);margin-bottom:6px;">
      RECIPIENTS
      <span style="float:right;font-weight:400;cursor:pointer;color:var(--blue);" id="smgToggleAll">Deselect All</span>
    </div>
    <div id="smgRecipList" style="max-height:200px;overflow-y:auto;border:1px solid var(--gray1);border-radius:8px;padding:0 12px;margin-bottom:14px;">
      ${buildRows("all")}
    </div>

    <div class="field">
      <label>Message <span id="smgCharCount" style="font-weight:400;color:var(--gray2);"></span></label>
      <textarea id="smgBody" rows="4" style="width:100%;padding:10px 12px;border:1px solid var(--gray1);border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;" placeholder="Type your message here…"></textarea>
    </div>

    <div style="background:var(--sky);border:1px solid var(--gray1);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12.5px;">
      <strong>🤖 Auto-Send:</strong> Tap <em>▶️ Start Auto-Send</em> — it opens the selected messaging app for each recipient automatically.
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12.5px;">
      <label style="font-weight:600;color:var(--gray3);white-space:nowrap;">⏱ Delay:</label>
      <select id="smgDelay" style="width:auto;padding:6px 10px;border:1px solid var(--gray1);border-radius:8px;font-size:13px;background:var(--white);">
        <option value="3000">3 seconds</option>
        <option value="4000" selected>4 seconds</option>
        <option value="5000">5 seconds</option>
        <option value="6000">6 seconds</option>
        <option value="8000">8 seconds</option>
        <option value="0">Manual (no auto-advance)</option>
      </select>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;">
      <button class="btn green block" id="smgStartBtn" ${allRecipients.length?"":'disabled'}>▶️ Start Auto-Send</button>
      <button class="btn ghost block" id="smgCopyNums">📋 Copy All Numbers</button>
    </div>

    <div id="smgAutoPanel" style="display:none;margin-top:14px;">
      <div style="background:var(--white);border:2px solid var(--blue);border-radius:10px;padding:14px 16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="font-weight:700;font-size:13px;color:var(--blue);">📤 Sending…</span>
          <span id="smgCounter" style="font-size:12px;color:var(--gray3);font-weight:600;"></span>
        </div>
        <div style="background:var(--gray1);border-radius:999px;height:8px;margin-bottom:12px;overflow:hidden;">
          <div id="smgBar" style="height:100%;background:var(--blue);border-radius:999px;transition:width .4s;width:0%;"></div>
        </div>
        <div id="smgCurrent" style="background:var(--sky);border:1px solid var(--gray1);border-radius:8px;padding:12px 14px;margin-bottom:10px;text-align:center;"></div>
        <div id="smgCountdownWrap" style="display:none;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:11.5px;">
            <span style="color:var(--gray3);font-weight:600;">⏳ Auto-advancing in <span id="smgCountdownNum" style="color:var(--blue);font-weight:700;"></span>s…</span>
            <span style="color:var(--gray2);">or tap below</span>
          </div>
          <div style="background:var(--gray1);border-radius:999px;height:5px;overflow:hidden;">
            <div id="smgCountdownBar" style="height:100%;background:var(--blue);border-radius:999px;width:100%;"></div>
          </div>
        </div>
        <div id="smgActions" style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn green" id="smgNextBtn" style="flex:1;">📱 Open &amp; Next</button>
          <button class="btn ghost" id="smgSkipBtn" style="flex:none;">⏭ Skip</button>
          <button class="btn red" id="smgStopBtn" style="flex:none;">⏹ Stop</button>
        </div>
        <div id="smgDone" style="display:none;text-align:center;padding:10px 0;">
          <div style="font-size:22px;">✅</div>
          <div style="font-weight:700;color:var(--green);font-size:14px;">All done!</div>
          <div id="smgDoneSummary" style="font-size:12px;color:var(--gray3);margin-top:4px;"></div>
        </div>
      </div>
      <div id="smgLog" style="margin-top:10px;max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;"></div>
    </div>
  `,true);

  // Character counter
  const textarea=body.querySelector("#smgBody");
  body.querySelector("#smgCharCount") && (textarea.oninput=()=>{
    const n=textarea.value.length;
    body.querySelector("#smgCharCount").textContent=`(${n} char${n!==1?"s":""})`;
  });

  // ── Platform / via button wiring ─────────────────────────────────
  const smgIsMobile=/Mobi|Android|iPhone/i.test(navigator.userAgent);
  let smgCurrentVia=smgIsMobile?"sms":"gmessages";
  const smgViaHint=body.querySelector("#smgViaHint");
  function smgSetViaHint(){
    const hints={
      sms: smgIsMobile?"📱 Opens your native SMS app for each recipient.":"📲 SMS (on desktop this opens Google Messages as fallback).",
      gmessages:"💬 Opens messages.google.com in your browser — make sure you're signed in.",
      whatsapp:"💬 Opens WhatsApp Web (or app) for each recipient."
    };
    if(smgViaHint) smgViaHint.textContent=hints[smgCurrentVia]||"";
  }
  smgSetViaHint();
  body.querySelectorAll(".smgViaBtn").forEach(btn=>{
    btn.onclick=()=>{
      smgCurrentVia=btn.dataset.via;
      body.querySelectorAll(".smgViaBtn").forEach(b=>{
        b.style.background="var(--white)"; b.style.color="var(--dark)"; b.style.border="1px solid var(--gray1)";
      });
      const colorMap={sms:"var(--blue)",gmessages:"#1a73e8",whatsapp:"#25d366"};
      btn.style.background=colorMap[smgCurrentVia]||"var(--blue)";
      btn.style.color="#fff"; btn.style.border="none";
      smgSetViaHint();
    };
  });

  // Track unchecked phones across filter rebuilds
  const smgUnchecked=new Set();

  function smgUpdateCount(){
    const total=body.querySelectorAll(".smgRecip").length;
    const checked=body.querySelectorAll(".smgRecip:checked").length;
    const lbl=body.querySelector("#smgToggleAll");
    if(lbl) lbl.textContent=checked===total?"Deselect All":"Select All";
  }

  function smgRebuildList(filter){
    // Save current unchecked state
    body.querySelectorAll(".smgRecip").forEach(cb=>{
      if(!cb.checked) smgUnchecked.add(cb.dataset.raw);
      else smgUnchecked.delete(cb.dataset.raw);
    });
    body.querySelector("#smgRecipList").innerHTML=buildRows(filter);
    // Restore unchecked state and wire onchange
    body.querySelectorAll(".smgRecip").forEach(cb=>{
      if(smgUnchecked.has(cb.dataset.raw)) cb.checked=false;
      cb.onchange=()=>{
        if(!cb.checked) smgUnchecked.add(cb.dataset.raw);
        else smgUnchecked.delete(cb.dataset.raw);
        smgUpdateCount();
      };
    });
    smgUpdateCount();
  }

  // Initial wire-up of existing checkboxes
  body.querySelectorAll(".smgRecip").forEach(cb=>{
    cb.onchange=()=>{
      if(!cb.checked) smgUnchecked.add(cb.dataset.raw);
      else smgUnchecked.delete(cb.dataset.raw);
      smgUpdateCount();
    };
  });

  // Filter buttons
  let currentFilter="all";
  body.querySelectorAll(".smgFilter").forEach(btn=>{
    btn.onclick=()=>{
      currentFilter=btn.dataset.filter;
      body.querySelectorAll(".smgFilter").forEach(b=>{ b.classList.remove("active"); b.style.background="var(--white)"; b.style.color=b.dataset.filter==="student"?"var(--green)":b.dataset.filter==="emergency"?"var(--orange)":"var(--dark)"; });
      btn.classList.add("active"); btn.style.background="var(--blue)"; btn.style.color="#fff";
      smgRebuildList(currentFilter);
    };
  });

  // Toggle all
  let toggleAllState=true;
  body.querySelector("#smgToggleAll").onclick=function(){
    toggleAllState=!toggleAllState;
    body.querySelectorAll(".smgRecip").forEach(c=>{
      c.checked=toggleAllState;
      if(toggleAllState) smgUnchecked.delete(c.dataset.raw);
      else smgUnchecked.add(c.dataset.raw);
    });
    this.textContent=toggleAllState?"Deselect All":"Select All";
  };

  // Copy numbers
  body.querySelector("#smgCopyNums").onclick=()=>{
    const nums=[...body.querySelectorAll(".smgRecip:checked")].map(c=>c.dataset.raw);
    if(!nums.length){ toast("No recipients selected.",false); return; }
    const txt=nums.join(", ");
    function doCopy(){
      const ta=document.createElement("textarea");
      ta.value=txt;
      ta.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;z-index:9999;font-size:14px;padding:8px;border:2px solid var(--blue);border-radius:8px;";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand("copy"); toast("📋 Copied "+nums.length+" number"+(nums.length!==1?"s":"")+"!"); }
      catch(e){ toast("Press Ctrl+C / Cmd+C to copy the selected numbers.",false); }
      setTimeout(()=>ta.remove(), 2500);
    }
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(txt).then(()=>toast("📋 Copied "+nums.length+" number"+(nums.length!==1?"s":"")+"!")).catch(doCopy);
    } else { doCopy(); }
  };

  // Auto-send engine
  let autoQ=[], autoIdx=0, sentCnt=0, skipCnt=0;
  let cdTimer=null, cdInterval=null;

  function clearCD(){
    if(cdTimer){ clearTimeout(cdTimer); cdTimer=null; }
    if(cdInterval){ clearInterval(cdInterval); cdInterval=null; }
    const w=body.querySelector("#smgCountdownWrap"); if(w) w.style.display="none";
  }
  function startCD(ms, cb){
    clearCD(); if(!ms) return;
    const w=body.querySelector("#smgCountdownWrap");
    const n=body.querySelector("#smgCountdownNum");
    const b=body.querySelector("#smgCountdownBar");
    if(!w) return;
    w.style.display="block";
    const end=Date.now()+ms;
    function tick(){ const rem=Math.max(0,end-Date.now()); if(n) n.textContent=Math.ceil(rem/1000); if(b){ b.style.transition="none"; b.style.width=(rem/ms*100)+"%"; } }
    tick(); cdInterval=setInterval(tick,200);
    cdTimer=setTimeout(()=>{ clearCD(); cb(); }, ms);
  }
  function updateUI(){
    const total=autoQ.length;
    const pct=total?Math.round(autoIdx/total*100):0;
    body.querySelector("#smgBar").style.width=pct+"%";
    body.querySelector("#smgCounter").textContent=`${autoIdx} / ${total}`;
    if(autoIdx>=total){
      clearCD();
      body.querySelector("#smgActions").style.display="none";
      body.querySelector("#smgDone").style.display="block";
      body.querySelector("#smgDoneSummary").textContent=`${sentCnt} sent · ${skipCnt} skipped`;
      body.querySelector("#smgCurrent").innerHTML=`<span style="color:var(--green);font-weight:700;">🎉 All ${total} done!</span>`;
      body.querySelector("#smgBar").style.background="var(--green)";
      body.querySelector("#smgStartBtn").disabled=false;
      body.querySelector("#smgStartBtn").textContent="🔄 Restart";
      // Save to DB log
      const chosenSids=[...new Set(autoQ.map(r=>r.sid).filter(Boolean))];
      const names=chosenSids.map(s=>DB.students[s]?DB.students[s].name:s).join(", ");
      DB.messages.push({from:fromLabel,fromId,to:names,body:textarea.value.trim(),date:todayStr(),recipients:chosenSids});
      saveDB();
      return;
    }
    const r=autoQ[autoIdx];
    const isMob=/Mobi|Android|iPhone/i.test(navigator.userAgent);
    const msg=textarea.value.trim();
    let lhref="", llabel="", lcolor="var(--blue)";
    if(smgCurrentVia==="gmessages"||(!isMob&&smgCurrentVia==="sms")){
      lhref=`https://messages.google.com/web/conversations/new`;
      llabel="💬 Open Google Messages"; lcolor="#1a73e8";
    } else if(smgCurrentVia==="whatsapp"){
      lhref=`https://wa.me/${r.phone}?text=${encodeURIComponent(msg)}`;
      llabel="💬 Open WhatsApp"; lcolor="#25d366";
    } else {
      lhref=`sms:${r.phone}?body=${encodeURIComponent(msg)}`;
      llabel="📲 Open SMS"; lcolor="var(--blue)";
    }
    const gmNote=(smgCurrentVia==="gmessages"||(!isMob&&smgCurrentVia==="sms"))?
      `<div style="font-size:11px;color:var(--gray3);margin-top:6px;">Number copied to clipboard — paste into Google Messages</div>`:"";
    body.querySelector("#smgCurrent").innerHTML=`
      <div style="font-size:11px;color:var(--gray3);margin-bottom:6px;font-weight:700;">RECIPIENT ${autoIdx+1} of ${total}</div>
      <div style="font-size:15px;font-weight:700;">${escapeHtml(r.name)}</div>
      <div class="mono" style="font-size:13px;color:var(--blue);margin:3px 0 8px;">${escapeHtml(r.raw)}</div>
      <a href="${lhref}" ${smgCurrentVia!=="sms"||!isMob?'target="_blank" rel="noopener"':''}
        onclick="navigator.clipboard.writeText('${r.raw.replace(/'/g,"\\'")}').catch(()=>{})"
        style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:${lcolor};color:#fff;border-radius:8px;font-weight:700;font-size:13.5px;text-decoration:none;">
        ${llabel}
      </a>
      ${gmNote}`;
  }
  function logItem(r, type){
    const ok=type==="sent";
    const div=document.createElement("div");
    div.style.cssText=`display:flex;align-items:center;gap:8px;padding:6px 10px;background:${ok?"var(--success)":"var(--warn)"};border:1px solid ${ok?"var(--green)":"var(--yellow)"};border-radius:7px;font-size:12.5px;`;
    div.innerHTML=`<span style="font-size:15px;">${ok?"✅":"⏭"}</span>
      <span style="flex:1;font-weight:600;">${escapeHtml(r.name)}</span>
      <span class="mono" style="color:var(--gray3);">${escapeHtml(r.raw)}</span>
      <span class="pill" style="background:${ok?"var(--success)":"var(--warn)"};color:${ok?"var(--green)":"var(--yellow)"};font-size:10px;">${ok?"Sent":"Skipped"}</span>`;
    body.querySelector("#smgLog").prepend(div);
  }
  async function sendAndAdvance(skip=false){
    if(autoIdx>=autoQ.length) return;
    clearCD();
    const r=autoQ[autoIdx];
    const delayMs=parseInt(body.querySelector("#smgDelay").value)||0;
    if(!skip){
      // Click the visible link button (most reliable for SMS and popups)
      const linkEl=body.querySelector("#smgCurrent a");
      if(linkEl){ linkEl.click(); }
      else {
        // Fallback
        const isMob=/Mobi|Android|iPhone/i.test(navigator.userAgent);
        const msg=textarea.value.trim();
        if(smgCurrentVia==="gmessages"||(!isMob&&smgCurrentVia==="sms")){
          window.open(`https://messages.google.com/web/conversations/new`,"_blank");
          navigator.clipboard.writeText(`${r.raw}\n\n${msg}`).catch(()=>{});
        } else if(smgCurrentVia==="whatsapp"){
          window.open(`https://wa.me/${r.phone}?text=${encodeURIComponent(msg)}`,"_blank");
        } else {
          const a=document.createElement("a"); a.href=`sms:${r.phone}?body=${encodeURIComponent(msg)}`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
      }
      sentCnt++; logItem(r,"sent");
    } else { skipCnt++; logItem(r,"skip"); }
    autoIdx++; updateUI();
    if(autoIdx<autoQ.length && delayMs>0) startCD(delayMs,()=>sendAndAdvance(false));
  }

  body.querySelector("#smgStartBtn").onclick=async()=>{
    const msg=textarea.value.trim();
    if(!msg){ toast("Type a message first.",false); textarea.focus(); return; }
    const checked=[...body.querySelectorAll(".smgRecip:checked")];
    if(!checked.length){ toast("Select at least one recipient.",false); return; }
    autoQ=checked.map(cb=>({ phone:cb.dataset.phone, raw:cb.dataset.raw, label:cb.dataset.label, sid:cb.dataset.sid,
      name:(cb.closest("label")||{querySelector:()=>null}).querySelector?.("span[style*='font-weight:600']")?.textContent||cb.dataset.raw }));
    autoIdx=0; sentCnt=0; skipCnt=0;
    body.querySelector("#smgAutoPanel").style.display="block";
    body.querySelector("#smgStartBtn").disabled=true;
    body.querySelector("#smgActions").style.display="flex";
    body.querySelector("#smgDone").style.display="none";
    body.querySelector("#smgLog").innerHTML="";
    body.querySelector("#smgBar").style.background="var(--blue)";
    updateUI();
    body.querySelector("#smgAutoPanel").scrollIntoView({behavior:"smooth",block:"nearest"});
    toast(`▶️ Auto-send started — ${autoQ.length} recipients.`);
    await sendAndAdvance(false);
  };
  body.querySelector("#smgNextBtn").onclick=()=>sendAndAdvance(false);
  body.querySelector("#smgSkipBtn").onclick=()=>sendAndAdvance(true);
  body.querySelector("#smgStopBtn").onclick=()=>{ clearCD(); toast("⏹ Auto-send stopped.",false); body.querySelector("#smgStartBtn").disabled=false; body.querySelector("#smgStartBtn").textContent="▶️ Restart Auto-Send"; };
}

/* ════════════════════════════════════════════════════════════════
   TEACHER APP
   ════════════════════════════════════════════════════════════════ */
const TEACHER_NAV=[["students","👥","My Students"],["subjects","📚","My Subjects"],["grades","📝","Grades"],
  ["attendance","📅","Attendance"],["messages","💬","Messages"],["tasks","✅","Tasks"],["profile","👤","My Profile"]];

function updateTeacherSidebarBrand(tid){
  const t=DB.teachers[tid];
  const brand=$("#screen-teacher .brand");
  if(!brand) return;
  if(t.photo){
    brand.innerHTML=`<img src="${t.photo}" style="width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #2a4368;margin-bottom:8px;" alt="Photo">
      <div class="who">${escapeHtml(t.name)}</div><div class="sub">${escapeHtml(tid)}</div>`;
  } else {
    brand.innerHTML=`<div class="ico">👩‍🏫</div><div class="who" id="teacherBrandName">${escapeHtml(t.name)}</div><div class="sub" id="teacherBrandId">${escapeHtml(tid)}</div>`;
  }
}
function enterTeacher(tid){
  const t=DB.teachers[tid];
  showScreen("screen-teacher");
  updateTeacherSidebarBrand(tid);
  const sb=$("#teacherSidebarNav");
  sb.innerHTML=TEACHER_NAV.map(([key,ico,label])=>
    `<button class="navbtn" data-key="${key}"><span>${ico}</span><span class="lbl">${label}</span></button>`).join("");
  sb.querySelectorAll(".navbtn").forEach(b=>b.onclick=()=>showTeacherPanel(b.dataset.key));
  showTeacherPanel("students");
}
function showTeacherPanel(key){
  STATE.teacherPanel=key;
  $$("#teacherSidebarNav .navbtn").forEach(b=>b.classList.toggle("active",b.dataset.key===key));
  const main=$("#teacherMain");
  main.innerHTML="";
  ({students:panelTeacherStudents,subjects:panelTeacherSubjects,grades:panelTeacherGrades,
    attendance:panelTeacherAttendance,messages:panelTeacherMessages,profile:panelTeacherProfile,tasks:panelTeacherTasks})[key](main);
}
function getTeacherStudents(){
  const t=DB.teachers[STATE.tid];
  const assigned=t.assignedStudents||[];
  return assigned.filter(sid=>DB.students[sid]);
}

// Get students enrolled in a specific teacher subject (by year+section or explicit list)
function getSubjectStudents(subjectEntry){
  if(!subjectEntry) return [];
  const sids=Object.keys(DB.students);
  if(subjectEntry.enrolledSids && subjectEntry.enrolledSids.length){
    return subjectEntry.enrolledSids.filter(sid=>DB.students[sid]);
  }
  // legacy fallback: year+section filter
  return sids.filter(sid=>{
    const s=DB.students[sid];
    if(subjectEntry.year && s.year!==subjectEntry.year) return false;
    if(subjectEntry.section && s.section!==subjectEntry.section) return false;
    return true;
  });
}

/* ── Teacher: My Subjects ────────────────────────────────────────── */
function panelTeacherSubjects(main){
  const t=DB.teachers[STATE.tid];
  if(!t.subjects) t.subjects=[];
  const allSids=Object.keys(DB.students);
  const allYears=[...new Set(allSids.map(s=>DB.students[s].year).filter(Boolean))].sort();
  const allSections=[...new Set(allSids.map(s=>DB.students[s].section).filter(Boolean))].sort();

  function render(){
    main.innerHTML="";
    const subjectsHTML=t.subjects.length ? t.subjects.map((subj,idx)=>{
      const students=getSubjectStudents(subj);
      return `<div class="card pad" style="margin-bottom:12px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div>
            <div style="font-weight:700;font-size:15px;color:var(--navy);">📚 ${escapeHtml(subj.name)}</div>
            <div style="font-size:12px;color:var(--gray3);margin-top:3px;">
              Grade: <strong>${escapeHtml(subj.year||"All")}</strong> &nbsp;·&nbsp;
              Section: <strong>${escapeHtml(subj.section||"All")}</strong> &nbsp;·&nbsp;
              <strong>${students.length}</strong> student${students.length!==1?"s":""}
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn sm" data-edit="${idx}">✏️ Edit</button>
            <button class="btn red sm" data-del="${idx}">🗑 Delete</button>
          </div>
        </div>
        ${students.length?`
        <div style="margin-top:10px;border-top:1px solid var(--gray1);padding-top:10px;">
          <div style="font-size:11.5px;font-weight:700;color:var(--gray3);margin-bottom:6px;">ENROLLED STUDENTS</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${students.map(sid=>`<span style="background:var(--sky);border:1px solid var(--gray1);border-radius:6px;padding:3px 9px;font-size:12px;">
              <span style="font-weight:600;">${escapeHtml(DB.students[sid].name)}</span>
              <span class="muted mono" style="font-size:11px;margin-left:4px;">${escapeHtml(sid)}</span>
            </span>`).join("")}
          </div>
        </div>`:""}
      </div>`;
    }).join("") : `<div class="card pad"><p class="muted center" style="margin:0;">No subjects yet. Add your first subject below.</p></div>`;

    main.appendChild(el(`
      <div class="panel">
        <div class="row-between">
          <div><h1>📚 My Subjects</h1><p class="lede" style="margin:0;">Create subjects and enroll students by year &amp; section. Attendance is available once a subject has enrolled students.</p></div>
          <button class="btn green" id="btnAddSubject">+ Add Subject</button>
        </div>
        <div id="subjectList" style="margin-top:14px;">${subjectsHTML}</div>
      </div>`));

    main.querySelector("#btnAddSubject").onclick=()=>dlgSubject(null);
    main.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>dlgSubject(parseInt(b.dataset.edit)));
    main.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
      const idx2=parseInt(b.dataset.del);
      confirmDialog("Delete Subject",`Delete subject "${t.subjects[idx2].name}"? Attendance records for this subject will remain.`,()=>{
        t.subjects.splice(idx2,1); saveDB(); render();
        toast("🗑 Subject deleted.");
      });
    });
  }

  function dlgSubject(editIdx){
    const isEdit=editIdx!==null && editIdx!==undefined;
    const existing=isEdit?t.subjects[editIdx]:{name:"",year:"",section:"",enrolledSids:[]};
    const allSids2=Object.keys(DB.students);

    // build student list filtered by currently selected year+section (will be re-rendered via JS)
    const body=openModal(isEdit?"Edit Subject":"Add New Subject",`
      <div class="field"><label>Subject Name</label>
        <input id="dSubjName" placeholder="e.g. Mathematics, Science 10" value="${escapeHtml(existing.name)}">
      </div>
      <div class="two-col">
        <div class="field"><label>Grade Level</label>
          <select id="dSubjYear">
            <option value="">— All Grades —</option>
            ${allYears.map(y=>`<option value="${escapeHtml(y)}" ${y===existing.year?"selected":""}>${escapeHtml(y)}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Section</label>
          <select id="dSubjSection">
            <option value="">— All Sections —</option>
            ${allSections.map(s=>`<option value="${escapeHtml(s)}" ${s===existing.section?"selected":""}>${escapeHtml(s)}</option>`).join("")}
          </select>
        </div>
      </div>
      <div style="font-size:11.5px;font-weight:700;color:var(--gray3);margin-bottom:6px;">
        SELECT STUDENTS &nbsp;<span id="dStudentCount" style="font-weight:400;color:var(--blue);"></span>
        <span style="float:right;font-weight:400;cursor:pointer;color:var(--blue);" id="dToggleAll">Select All Filtered</span>
      </div>
      <div id="dStudentList" style="max-height:240px;overflow-y:auto;border:1px solid var(--gray1);border-radius:8px;padding:4px 10px;margin-bottom:14px;"></div>
      <button class="btn green block" id="dSubjSave">${isEdit?"💾 Save Changes":"+ Add Subject"}</button>
    `);

    function buildStudentList(){
      const yr=body.querySelector("#dSubjYear").value;
      const sec=body.querySelector("#dSubjSection").value;
      const filtered=allSids2.filter(sid=>{
        const s=DB.students[sid];
        if(yr && s.year!==yr) return false;
        if(sec && s.section!==sec) return false;
        return true;
      });
      const enrolled=isEdit?(existing.enrolledSids||[]):[];
      body.querySelector("#dStudentList").innerHTML=filtered.length?filtered.map(sid=>{
        const s=DB.students[sid];
        const chk=enrolled.includes(sid)||(!isEdit&&yr&&sec);
        return `<label style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--gray1);cursor:pointer;">
          <input type="checkbox" class="dStudChk" data-sid="${sid}" ${chk?"checked":""} style="width:15px;height:15px;accent-color:var(--blue);flex:none;">
          <span style="flex:1;">
            <span style="font-weight:600;">${escapeHtml(s.name)}</span>
            <span class="muted mono" style="font-size:11px;margin-left:6px;">${escapeHtml(sid)}</span>
            <br><span style="font-size:11.5px;color:var(--gray3);">${escapeHtml(s.year||"")}&nbsp;${escapeHtml(s.section||"")}&nbsp;${escapeHtml(s.course||"")}</span>
          </span>
        </label>`;
      }).join("") : `<p class="muted" style="margin:12px 0;font-size:13px;text-align:center;">No students match the selected year/section.</p>`;
      updateCount();
    }

    function updateCount(){
      const chks=body.querySelectorAll(".dStudChk:checked");
      const el3=body.querySelector("#dStudentCount");
      if(el3) el3.textContent=`(${chks.length} selected)`;
    }

    body.querySelector("#dSubjYear").onchange=buildStudentList;
    body.querySelector("#dSubjSection").onchange=buildStudentList;
    body.querySelector("#dStudentList").addEventListener("change",updateCount);
    body.querySelector("#dToggleAll").onclick=()=>{
      const chks=body.querySelectorAll(".dStudChk");
      const allChecked=[...chks].every(c=>c.checked);
      chks.forEach(c=>c.checked=!allChecked);
      body.querySelector("#dToggleAll").textContent=allChecked?"Select All Filtered":"Deselect All";
      updateCount();
    };

    body.querySelector("#dSubjSave").onclick=()=>{
      const name=body.querySelector("#dSubjName").value.trim();
      if(!name){ toast("Subject name is required.",false); return; }
      const yr=body.querySelector("#dSubjYear").value;
      const sec=body.querySelector("#dSubjSection").value;
      const enrolledSids=[...body.querySelectorAll(".dStudChk:checked")].map(c=>c.dataset.sid);
      if(!enrolledSids.length){ toast("Select at least one student.",false); return; }
      const entry={name,year:yr,section:sec,enrolledSids};
      if(isEdit) t.subjects[editIdx]=entry;
      else t.subjects.push(entry);
      saveDB(); closeModal(); render();
      toast(`✅ Subject "${name}" ${isEdit?"updated":"added"} with ${enrolledSids.length} student${enrolledSids.length!==1?"s":""}.`);
    };

    buildStudentList();
  }

  render();
}

function panelTeacherGrades(main){
  const teacher=DB.teachers[STATE.tid]||{};
  if(!teacher.subjects) teacher.subjects=[];
  if(!DB.quizGrades) DB.quizGrades={};
  const tid=STATE.tid;

  // If no subjects set up, prompt
  if(!teacher.subjects.length){
    main.appendChild(el(`
      <div class="panel">
        <h1>📝 Grades</h1>
        <div class="card pad" style="max-width:480px;text-align:center;padding:36px 24px;">
          <div style="font-size:36px;margin-bottom:12px;">📚</div>
          <div style="font-weight:700;font-size:16px;color:var(--navy);margin-bottom:8px;">No Subjects Set Up Yet</div>
          <p style="color:var(--gray3);font-size:13px;margin:0 0 18px;">Create a subject and enroll students first before adding grades.</p>
          <button class="btn green" id="btnGoSubjectsGr">Go to My Subjects →</button>
        </div>
      </div>`));
    main.querySelector("#btnGoSubjectsGr").onclick=()=>showTeacherPanel("subjects");
    return;
  }

  // Grade type tabs
  if(!STATE.gradeTab) STATE.gradeTab="activity"; // 'activity' or 'quarter'
  if(!STATE.gradeSubj) STATE.gradeSubj=teacher.subjects[0]?.name||"";

  function getQGrades(subjName){
    // DB.quizGrades[tid][subjName][sid] = [{id, type, title, date, score, maxScore}]
    if(!DB.quizGrades[tid]) DB.quizGrades[tid]={};
    if(!DB.quizGrades[tid][subjName]) DB.quizGrades[tid][subjName]={};
    return DB.quizGrades[tid][subjName];
  }

  function renderAll(){
    main.innerHTML="";
    const selSubj=STATE.gradeSubj;
    const selTab=STATE.gradeTab;
    const entry=teacher.subjects.find(s=>s.name===selSubj);
    const sids=getSubjectStudents(entry);

    main.appendChild(el(`
      <div class="panel">
        <div class="row-between">
          <h1>📝 Grades</h1>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn green" id="gBtnAddActivity">+ Add Score</button>
            <button class="btn gray" id="gBtnExport">💾 Export CSV</button>
          </div>
        </div>
        <p class="lede">Record quiz, exam, and activity scores per subject. Quarter grades are calculated automatically.</p>

        <!-- Subject tabs -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
          ${teacher.subjects.map(s=>`
            <button class="btn ${s.name===selSubj?'':'ghost'} sm gSubjTab" data-subj="${escapeHtml(s.name)}"
              style="${s.name===selSubj?'':'color:var(--gray3);'}">
              📚 ${escapeHtml(s.name)}
            </button>`).join("")}
        </div>

        <!-- Subject info bar -->
        ${entry?`<div class="card pad" style="margin-bottom:14px;background:var(--sky);border-color:var(--lblue);">
          <div style="font-size:12.5px;color:var(--gray3);">
            <strong style="color:var(--navy);">${escapeHtml(selSubj)}</strong>
            &nbsp;·&nbsp; Grade: <strong>${escapeHtml(entry.year||"All")}</strong>
            &nbsp;·&nbsp; Section: <strong>${escapeHtml(entry.section||"All")}</strong>
            &nbsp;·&nbsp; <strong>${sids.length}</strong> students enrolled
          </div>
        </div>`:""}

        <!-- Grade type tabs -->
        <div style="display:flex;gap:0;margin-bottom:16px;border:1px solid var(--gray1);border-radius:9px;overflow:hidden;width:fit-content;">
          <button class="gTypeTab" data-tab="activity" style="padding:8px 18px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:${selTab==='activity'?'var(--blue)':'var(--white)'};color:${selTab==='activity'?'#fff':'var(--gray3)'};">📋 Quiz / Exam / Activity</button>
          <button class="gTypeTab" data-tab="quarter" style="padding:8px 18px;font-size:13px;font-weight:600;border:none;cursor:pointer;border-left:1px solid var(--gray1);background:${selTab==='quarter'?'var(--blue)':'var(--white)'};color:${selTab==='quarter'?'#fff':'var(--gray3)'};">📊 Quarter Grades</button>
        </div>

        <div id="gradeContent"></div>
      </div>`));

    // Subject tab clicks
    main.querySelectorAll(".gSubjTab").forEach(b=>b.onclick=()=>{
      STATE.gradeSubj=b.dataset.subj; renderAll();
    });
    // Type tab clicks
    main.querySelectorAll(".gTypeTab").forEach(b=>b.onclick=()=>{
      STATE.gradeTab=b.dataset.tab; renderAll();
    });

    if(selTab==="activity") renderActivityTab(sids, selSubj);
    else renderQuarterTab(sids, selSubj);

    // Add Score button
    main.querySelector("#gBtnAddActivity").onclick=()=>{
      if(selTab==="activity") dlgAddActivityScore(sids, selSubj);
      else dlgAddQuarterGrade(sids, selSubj);
    };
    main.querySelector("#gBtnExport").onclick=()=>exportGradesCsv(sids, selSubj);
  }

  /* ── Activity/Quiz/Exam tab ── */
  function renderActivityTab(sids, subjName){
    const content=main.querySelector("#gradeContent"); if(!content) return;
    const qg=getQGrades(subjName);

    // Collect all activity columns across all students
    const activityMap={}; // id -> {type,title,date,maxScore}
    sids.forEach(sid=>{
      (qg[sid]||[]).forEach(rec=>{
        if(!activityMap[rec.id]) activityMap[rec.id]={id:rec.id,type:rec.type,title:rec.title,date:rec.date,maxScore:rec.maxScore};
      });
    });
    const activities=Object.values(activityMap).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));

    if(!activities.length){
      content.innerHTML=`<div class="card pad" style="text-align:center;padding:36px 24px;">
        <div style="font-size:32px;margin-bottom:10px;">📋</div>
        <div style="font-weight:700;color:var(--navy);margin-bottom:6px;">No scores recorded yet</div>
        <p class="muted" style="margin:0 0 14px;">Click "+ Add Score" to record a quiz, exam, or activity for your students.</p>
      </div>`;
      return;
    }

    const typeColor={Quiz:"var(--blue)",Exam:"var(--red)",Activity:"var(--green)"};
    const typeBg={Quiz:"#dbeafe",Exam:"#fee2e2",Activity:"#dcfce7"};

    const headCols=activities.map(a=>`
      <th style="text-align:center;min-width:70px;padding:6px 8px;">
        <div style="font-size:10px;font-weight:700;color:${typeColor[a.type]||'var(--gray3)'};">${escapeHtml(a.type)}</div>
        <div style="font-size:11px;font-weight:600;white-space:nowrap;">${escapeHtml(a.title)}</div>
        <div style="font-size:10px;color:var(--gray2);">${a.date.slice(5)} / ${a.maxScore}</div>
        <div style="display:flex;gap:3px;justify-content:center;margin-top:3px;">
          <button class="gEditAct" data-id="${escapeHtml(a.id)}" style="border:none;background:var(--gray1);border-radius:4px;padding:1px 5px;font-size:10px;cursor:pointer;">✏️</button>
          <button class="gDelAct" data-id="${escapeHtml(a.id)}" style="border:none;background:#fee2e2;color:var(--red);border-radius:4px;padding:1px 5px;font-size:10px;cursor:pointer;">🗑</button>
        </div>
      </th>`).join("");

    const rows=sids.map((sid,i)=>{
      const s=DB.students[sid];
      const recs=qg[sid]||[];
      const cells=activities.map(a=>{
        const rec=recs.find(r=>r.id===a.id);
        const score=rec?.score;
        const pct=score!==undefined&&score!==null?Math.round(score/a.maxScore*100):null;
        const bg=pct===null?"":pct>=75?typeBg.Activity:pct>=50?typeBg.Quiz:typeBg.Exam;
        return `<td style="text-align:center;background:${bg};padding:6px 8px;">
          <span style="font-weight:700;font-size:13px;">${score!==undefined&&score!==null?score:"—"}</span>
          ${pct!==null?`<span style="font-size:10px;color:var(--gray3);display:block;">${pct}%</span>`:""}
        </td>`;
      }).join("");
      // Average
      const scored=activities.filter(a=>{ const r=recs.find(r=>r.id===a.id); return r?.score!==undefined&&r?.score!==null; });
      const totalPct=scored.length?Math.round(scored.reduce((sum,a)=>{ const r=recs.find(r=>r.id===a.id); return sum+(r.score/a.maxScore*100); },0)/scored.length):null;
      return `<tr>
        <td class="center muted" style="font-size:11.5px;">${i+1}</td>
        <td class="mono" style="font-size:11.5px;white-space:nowrap;">${escapeHtml(sid)}</td>
        <td style="font-weight:600;white-space:nowrap;">${escapeHtml(s.name)}</td>
        <td style="font-size:11.5px;">${escapeHtml((s.year||"")+(s.section?" · "+s.section:""))}</td>
        ${cells}
        <td style="text-align:center;font-weight:700;font-size:13px;background:${totalPct===null?"":totalPct>=75?"#dcfce7":totalPct>=50?"#fef9c3":"#fee2e2"};">
          ${totalPct!==null?totalPct+"%":"—"}
        </td>
      </tr>`;
    }).join("");

    content.innerHTML=`
      <div class="card" style="overflow:hidden;">
        <div style="overflow-x:auto;">
          <table class="tbl" style="font-size:12.5px;">
            <thead><tr>
              <th style="width:28px;">#</th>
              <th style="white-space:nowrap;">Student ID</th>
              <th style="white-space:nowrap;">Name</th>
              <th>Year / Sec</th>
              ${headCols}
              <th style="text-align:center;min-width:60px;">Avg %</th>
            </tr></thead>
            <tbody>${rows||`<tr class="empty-row"><td colspan="${5+activities.length+1}">No students enrolled.</td></tr>`}</tbody>
          </table>
        </div>
      </div>`;

    // Edit/delete activity column buttons
    content.querySelectorAll(".gEditAct").forEach(b=>b.onclick=()=>{
      const act=activityMap[b.dataset.id]; if(!act) return;
      dlgEditActivity(act, subjName, sids);
    });
    content.querySelectorAll(".gDelAct").forEach(b=>b.onclick=()=>{
      const act=activityMap[b.dataset.id]; if(!act) return;
      confirmDialog("Delete Activity",`Delete "${act.title}" and all scores for it?`,()=>{
        sids.forEach(sid=>{
          if(!qg[sid]) return;
          qg[sid]=qg[sid].filter(r=>r.id!==act.id);
        });
        saveDB(); renderAll();
        toast(`🗑 "${act.title}" deleted.`);
      });
    });
  }

    if(!sids.length){
      content.innerHTML=`<div class="card pad"><p class="muted center" style="margin:0;">No students enrolled in this subject.</p></div>`;
      return;

        <td><button class="btn ghost sm gEditQ" data-sid="${sid}">${hasg?"✏️ Edit":"+ Add"}</button></td>
      </tr>`;
    }).join("");
    content.innerHTML=`
      <div class="card">
        <div class="tbl-wrap">
          <table class="tbl" style="font-size:12.5px;">
            <thead><tr>
              <th>#</th><th>ID</th><th>Name</th><th>Year/Sec</th>
              <th class="center">Q1</th><th class="center">Q2</th><th class="center">Q3</th><th class="center">Q4</th>
              <th class="center">Final</th><th class="center">Grade</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    content.querySelectorAll(".gEditQ").forEach(b=>b.onclick=()=>{
      STATE.gradeSid=b.dataset.sid;
      dlgAddQuarterGradeForStudent(b.dataset.sid, subjName);
    });
  }

  /* ── Dialogs ── */
  function dlgAddActivityScore(sids, subjName){
    const today=todayStr();
    const body=openModal("+ Add Quiz / Exam / Activity",`
      <div class="two-col">
        <div class="field"><label>Type</label>
          <select id="actType">
            <option value="Quiz">Quiz</option>
            <option value="Exam">Exam</option>
            <option value="Activity">Activity</option>
          </select>
        </div>
        <div class="field"><label>Max Score</label>
          <input id="actMax" type="number" min="1" max="1000" value="100" placeholder="e.g. 100">
        </div>
      </div>
      <div class="field"><label>Title / Description</label>
        <input id="actTitle" placeholder="e.g. Quiz 1 – Chapter 3, Midterm Exam">

              </label>`:"").join("")}
          </div>
        </div>`;
      }).join("")||`<p class="muted" style="margin:12px;text-align:center;">No students enrolled.</p>`;
    }
    body.querySelectorAll(".qCol").forEach(c=>c.onchange=buildBulkList);
    buildBulkList();

    body.querySelector("#bulkQSave").onclick=()=>{
      let saved=0;
      sids.forEach(sid=>{
        const s=DB.students[sid];
        if(!s.grades) s.grades={};
        const existing=s.grades[subjName]||{q1:null,q2:null,q3:null,q4:null};
        const inputs=body.querySelectorAll(`.bulkQScore[data-sid="${sid}"]`);
        let changed=false;
        inputs.forEach(inp=>{
          const q=inp.dataset.q;
          const raw=inp.value.trim();
          if(raw==="") return;
          const v=parseFloat(raw);
          if(!isNaN(v)&&v>=0&&v<=100){ existing[q]=v; changed=true; }
        });
        if(changed){
          const final=computeFinal(existing);
          s.grades[subjName]={...existing,score:final,letter:scoreToLetter(final),date:todayStr()};

      });
      saveDB(); closeModal(); renderAll();

  function dlgAddQuarterGradeForStudent(sid, subjName){
    const s=DB.students[sid];
    const g=s.grades?.[subjName];
    const body=openModal(`📊 Quarter Grade — ${escapeHtml(s.name)}`,`
      <p class="modal-help">${escapeHtml(subjName)} · Leave blank if not yet recorded.</p>
      ${["q1","q2","q3","q4"].map((q,i)=>`
        <div class="field"><label>Q${i+1} Score (0–100)</label>
          <input id="sqg_${q}" type="number" min="0" max="100"
            value="${g&&g[q]!==null&&g[q]!==undefined?Math.round(g[q]):""}">
        </div>`).join("")}
      <button class="btn green block" id="sqgSave">💾 Save</button>
    `);
    body.querySelector("#sqgSave").onclick=()=>{
      if(!s.grades) s.grades={};
      const existing=s.grades[subjName]||{q1:null,q2:null,q3:null,q4:null};
      for(const q of ["q1","q2","q3","q4"]){
        const raw=body.querySelector("#sqg_"+q).value.trim();
        if(raw==="") continue;
        const v=parseFloat(raw);
        if(!isNaN(v)&&v>=0&&v<=100) existing[q]=v;
      }
      if(["q1","q2","q3","q4"].every(q=>existing[q]===null||existing[q]===undefined)){
        toast("Enter at least one quarter score.",false); return;
      }
      const final=computeFinal(existing);
      s.grades[subjName]={...existing,score:final,letter:scoreToLetter(final),date:todayStr()};
      saveDB(); closeModal(); renderAll();
      toast(`✅ ${s.name} — ${subjName}: ${final.toFixed(1)} (${scoreToLetter(final)})`);
    };
  }

  function exportGradesCsv(sids, subjName){
    const qg=getQGrades(subjName);
    const activityMap={};
    sids.forEach(sid=>(qg[sid]||[]).forEach(r=>{ if(!activityMap[r.id]) activityMap[r.id]=r; }));
    const activities=Object.values(activityMap).sort((a,b)=>a.date.localeCompare(b.date));
    const header=["Student ID","Name","Grade","Section",...activities.map(a=>`${a.type}: ${a.title} (${a.date}) /${a.maxScore}`),"Q1","Q2","Q3","Q4","Final","Grade"];
    const rows=[header];
    sids.forEach(sid=>{
      const s=DB.students[sid];
      const g=s.grades?.[subjName];
      const recs=qg[sid]||[];
      const actCols=activities.map(a=>{ const r=recs.find(r=>r.id===a.id); return r?.score!==undefined&&r?.score!==null?r.score:""; });
      rows.push([sid,s.name,s.year||"",s.section||"",...actCols,g?.q1!==null&&g?.q1!==undefined?g.q1:"",g?.q2!==null&&g?.q2!==undefined?g.q2:"",g?.q3!==null&&g?.q3!==undefined?g.q3:"",g?.q4!==null&&g?.q4!==undefined?g.q4:"",g?.score!==undefined?g.score.toFixed(1):"",g?.letter||""]);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const a2=document.createElement("a"); a2.href=URL.createObjectURL(blob); a2.download=`grades_${subjName.replace(/\s+/g,"_")}.csv`;
    document.body.appendChild(a2); a2.click(); a2.remove();
    toast(`💾 grades_${subjName}.csv exported.`);
  }

  renderAll();
}

          </div>
          <button class="btn green sm" id="tBtnRangeExportCsv" style="align-self:flex-end;">Export CSV</button>

    if(!DB.subjectAttendance[sid]) DB.subjectAttendance[sid]={};

    // Refresh students for this subject

    const lbl1=document.getElementById("tAttSubjLabel");
    const lbl2=document.getElementById("tAttDateLabel");
    if(lbl1) lbl1.textContent=subj||"—";
    if(lbl2) lbl2.textContent=date||"—";

    // Show subject meta
    const meta=document.getElementById("tSubjMeta");
    if(meta){
      const entry=getSubjEntry(subj);
      if(entry){
        meta.innerHTML=`Grade: <strong>${escapeHtml(entry.year||"All")}</strong> &nbsp;·&nbsp; Section: <strong>${escapeHtml(entry.section||"All")}</strong> &nbsp;·&nbsp; <strong>${sids.length}</strong> enrolled student${sids.length!==1?"s":""}`;

    }

    const body=document.getElementById("tAttBody"); if(!body) return;
    let pCount=0,aCount=0,nCount=0;
    body.innerHTML=sids.map((sid,i)=>{
      const s=DB.students[sid];
      const rec=getSubjAttendance(sid,date,subj);
      const status=rec?rec.status:null;
      if(status==="Present") pCount++;
      else if(status==="Absent") aCount++;
      else nCount++;
      const pill=status==="Present"?`<span class="pill ok">Present</span>`:status==="Absent"?`<span class="pill bad">Absent</span>`:`<span class="muted" style="font-size:11.5px;">Not marked</span>`;

  function markSubj(sid,status){
    const subj=document.getElementById("tAttSubj")?.value||selSubj;
    const date=document.getElementById("tAttDate")?.value||today;
    setSubjAttendance(sid,date,subj,status);
    toast(`${status==="Present"?"✅":"❌"} ${DB.students[sid].name} — ${subj}`);
    renderAttTable();
  }

  function renderSF2Summary(){
    const subj=document.getElementById("tAttSubj")?.value||selSubj;
    const date=document.getElementById("tAttDate")?.value||today;
    const ym=date.slice(0,7); // YYYY-MM
    const summaryWrap=document.getElementById("tSF2SummaryBody"); if(!summaryWrap) return;

    // Get all dates in this month that have records for this subject
    const allDates=new Set();
    if(DB.subjectAttendance){
      for(const sid of sids){
        const recs=DB.subjectAttendance[sid]||{};
        Object.keys(recs).forEach(k=>{
          if(k.startsWith(ym) && k.includes("||"+subj)) allDates.add(k.split("||")[0]);
        });
      }
    }
    const sortedDates=[...allDates].sort();
    if(!sortedDates.length){
      summaryWrap.innerHTML=`<p class="muted" style="margin:10px;font-size:13px;">No records yet for <strong>${escapeHtml(subj)}</strong> in ${ym}.</p>`;
      return;
    }

    // Build header row with dates
    const headCells=sortedDates.map(d=>`<th style="text-align:center;min-width:44px;font-size:11px;">${d.slice(5)}</th>`).join("");
    const rows=sids.map((sid,i)=>{
      const s=DB.students[sid];
      let pCt=0;
      const cells=sortedDates.map(d=>{
        const rec=getSubjAttendance(sid,d,subj);
        if(rec?.status==="Present"){ pCt++; return `<td class="center" style="background:#dcfce7;color:var(--green);font-size:12px;font-weight:700;">P</td>`; }
        if(rec?.status==="Absent") return `<td class="center" style="background:#fee2e2;color:var(--red);font-size:12px;font-weight:700;">A</td>`;
        return `<td class="center muted" style="font-size:11px;">—</td>`;
      }).join("");
      const rate=sortedDates.length?Math.round(pCt/sortedDates.length*100)+"%":"—";
      return `<tr>
        <td class="center muted" style="width:28px;font-size:11px;">${i+1}</td>
        <td class="mono" style="font-size:11.5px;white-space:nowrap;">${escapeHtml(sid)}</td>
        <td style="font-weight:600;font-size:12px;white-space:nowrap;">${escapeHtml(s.name)}</td>
        ${cells}
        <td class="center" style="font-weight:700;font-size:12px;">${pCt}/${sortedDates.length}</td>
        <td class="center"><span class="pill ${pCt/sortedDates.length>=0.75?"ok":"bad"}" style="font-size:10.5px;">${rate}</span></td>
      </tr>`;
    }).join("");

    summaryWrap.innerHTML=`
      <div style="font-size:12px;color:var(--gray3);margin-bottom:8px;padding:0 4px;">
        Subject: <strong>${escapeHtml(subj)}</strong> &nbsp;·&nbsp; Month: <strong>${ym}</strong> &nbsp;·&nbsp; School Days Recorded: <strong>${sortedDates.length}</strong>
      </div>
      <div style="overflow-x:auto;">
        <table class="tbl" style="font-size:12px;min-width:600px;">
          <thead><tr>
            <th style="width:28px;">#</th><th style="white-space:nowrap;">ID</th><th style="white-space:nowrap;">Name</th>
            ${headCells}
            <th style="text-align:center;">Days Present</th><th style="text-align:center;">Rate</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // Wire up
  const subjSel=main.querySelector("#tAttSubj");
  const dateSel=main.querySelector("#tAttDate");
  if(subjSel) subjSel.onchange=renderAttTable;
  if(dateSel) dateSel.onchange=renderAttTable;

  main.querySelector("#tBtnMarkAllP")?.addEventListener("click",()=>{
    const subj=document.getElementById("tAttSubj")?.value||selSubj;
    const date=document.getElementById("tAttDate")?.value||today;
    sids.forEach(sid=>setSubjAttendance(sid,date,subj,"Present"));
    toast("✅ All students marked Present"); renderAttTable();
  });
  main.querySelector("#tBtnMarkAllA")?.addEventListener("click",()=>{
    const subj=document.getElementById("tAttSubj")?.value||selSubj;
    const date=document.getElementById("tAttDate")?.value||today;
    sids.forEach(sid=>setSubjAttendance(sid,date,subj,"Absent"));
    toast("❌ All students marked Absent"); renderAttTable();
  });
  main.querySelector("#tBtnExportSF2")?.addEventListener("click",()=>{
    const subj=document.getElementById("tAttSubj")?.value||selSubj;
    const date=document.getElementById("tAttDate")?.value||today;
    const ym=date.slice(0,7);
    exportSF2Csv(sids,subj,ym,"teacher");
  });

  // ── Date Range Exports ─────────────────────────────────────────────────
  main.querySelector("#tBtnRangeExportCsv")?.addEventListener("click",()=>{
    const fromVal=main.querySelector("#tRangeFrom")?.value;
    const toVal=main.querySelector("#tRangeTo")?.value;
    const subj=main.querySelector("#tAttSubj")?.value||selSubj;
    if(!fromVal||!toVal){ toast("Please select both From and To dates.", false); return; }
    if(fromVal>toVal){ toast("'From' date must be before 'To' date.", false); return; }
    const rows=[["Student ID","Name","Grade","Section","Subject","Date","Time In","Status","Remarks"]];
    if(DB.subjectAttendance){
      for(const sid in DB.subjectAttendance){
        const s=DB.students[sid]; if(!s) continue;
        for(const [k,rec] of Object.entries(DB.subjectAttendance[sid]||{})){
          const recDate=rec.date||k.split("||")[0];
          const recSubj=rec.subject||k.split("||")[1]||"";
          if(recSubj!==subj) continue;
          if(recDate<fromVal||recDate>toVal) continue;
          rows.push([sid,s.name,s.year||"",s.section||"",subj,recDate,rec.timeIn||"—",rec.status||"Not Marked",rec.remark||""]);
        }
      }
    }
    if(rows.length<=1){ toast("No records found in selected date range.", false); return; }
    rows.sort((a,b)=>a[5].localeCompare(b[5])||a[1].localeCompare(b[1]));
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const a2=document.createElement("a"); a2.href=URL.createObjectURL(blob);
    a2.download=`attendance_${subj.replace(/\s+/g,"_")}_${fromVal}_to_${toVal}.csv`;
    document.body.appendChild(a2); a2.click(); a2.remove();
    toast("💾 Exported "+subj+" attendance "+fromVal+" to "+toVal);
  });

  main.querySelector("#tBtnRangeExportSF2")?.addEventListener("click",()=>{
    const fromVal=main.querySelector("#tRangeFrom")?.value;
    const toVal=main.querySelector("#tRangeTo")?.value;
    const subj=main.querySelector("#tAttSubj")?.value||selSubj;
    if(!fromVal||!toVal){ toast("Please select both From and To dates.", false); return; }
    if(fromVal>toVal){ toast("'From' date must be before 'To' date.", false); return; }
    const allDates=new Set();
    if(DB.subjectAttendance){
      for(const sid in DB.subjectAttendance){
        for(const k of Object.keys(DB.subjectAttendance[sid]||{})){
          const parts=k.split("||");
          const d=parts[0], subj2=parts[1];
          if(subj2===subj&&d>=fromVal&&d<=toVal) allDates.add(d);
        }
      }
    }
    const sortedDates=[...allDates].sort();
    if(!sortedDates.length){ toast("No SF2 records found for that subject in the date range.", false); return; }
    // Get all students who have any record for this subject
    const eligibleSids=[];
    if(DB.subjectAttendance){
      for(const sid in DB.subjectAttendance){
        const s=DB.students[sid]; if(!s) continue;
        const hasRecord=Object.keys(DB.subjectAttendance[sid]||{}).some(k=>k.split("||")[1]===subj);
        if(hasRecord) eligibleSids.push(sid);
      }
    }
    const header=["#","Student ID","Name","Grade","Section",...sortedDates.map(d=>d.slice(5)),"Days Present","Days Absent","Rate"];
    const csvRows=[header];
    eligibleSids.forEach((sid,i)=>{
      const s=DB.students[sid]; let pCt=0,aCt=0;
      const cells=sortedDates.map(d=>{
        const rec=DB.subjectAttendance?.[sid]?.[d+"||"+subj];
        if(rec?.status==="Present"){ pCt++; return "P"; }
        if(rec?.status==="Absent"){ aCt++; return "A"; }
        return "";
      });
      const rate=sortedDates.length?Math.round(pCt/sortedDates.length*100)+"%":"—";
      csvRows.push([i+1,sid,s.name,s.year||"",s.section||"",...cells,pCt,aCt,rate]);
    });
    const csv=csvRows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const a2=document.createElement("a"); a2.href=URL.createObjectURL(blob);
    a2.download=`SF2_${subj.replace(/\s+/g,"_")}_${fromVal}_to_${toVal}.csv`;
    document.body.appendChild(a2); a2.click(); a2.remove();
    toast("💾 SF2 exported: "+subj+" ("+fromVal+" to "+toVal+")");
  });

  renderAttTable();
}

/* ════════════════════════════════════════════════════════════════
   TASKS & REMINDERS ENGINE
   ════════════════════════════════════════════════════════════════ */

function initTasks(){
  if(!DB.tasks) DB.tasks=[];
}
function getAllTasks(){ initTasks(); return DB.tasks; }
function newTaskId(){
  return "task_"+ Date.now()+"_"+Math.random().toString(36).slice(2,7);
}

/* ── Per-user task completion helpers ───────────────────────────────
   Each task stores:  task.completions = { userId: { done, doneAt } }
   Done state is per-recipient — one user marking done does NOT affect others.
──────────────────────────────────────────────────────────────────── */
function taskDoneFor(task, userId){
  if(!task.completions) return false;
  return !!(task.completions[userId]&&task.completions[userId].done);
}
function taskDoneAtFor(task, userId){
  if(!task.completions) return null;
  return (task.completions[userId]&&task.completions[userId].doneAt)||null;
}
function setTaskDoneFor(task, userId, done){
  if(!task.completions) task.completions={};
  if(!task.completions[userId]) task.completions[userId]={done:false,doneAt:null};
  task.completions[userId].done=done;
  task.completions[userId].doneAt=done?Date.now():null;
}
// True if every targeted recipient has marked done
function taskDoneForAll(task){
  if(!task.targets||!task.targets.length) return false;
  return task.targets.every(id=>taskDoneFor(task,id));
}

/* ── Popup notification system ──────────────────────────────────── */
let _taskPopupTimer=null;
let _shownPopups=new Set(); // task ids already shown this session

function startTaskPopups(){
  if(_taskPopupTimer) clearInterval(_taskPopupTimer);
  _checkTaskPopups();
  _taskPopupTimer=setInterval(_checkTaskPopups, 15000);
}
function stopTaskPopups(){
  if(_taskPopupTimer){ clearInterval(_taskPopupTimer); _taskPopupTimer=null; }
}

function _checkTaskPopups(){
  if(!DB||!STATE.role) return;
  initTasks();
  const now=Date.now();
  const host=document.getElementById("taskPopupHost");
  if(!host) return;

  // determine who the current user is
  const myId = STATE.role==="student"? STATE.sid
              : STATE.role==="teacher"? STATE.tid
              : null; // admin gets no incoming popups
  if(!myId) return;

  DB.tasks.forEach(task=>{
    if(taskDoneFor(task, myId)) return;
    if(_shownPopups.has(task.id)) return;
    // check if this task targets the current user
    const targets=task.targets||[];
    if(!targets.includes(myId)) return;
    // check due time if set — show if due within the next 24h or already past due
    if(task.dueTs){
      const due=parseInt(task.dueTs);
      if(due - now > 24*60*60*1000) return; // too far in future
    }
    _shownPopups.add(task.id);
    _showTaskPopup(task);
  });
}

function _showTaskPopup(task){
  const host=document.getElementById("taskPopupHost");
  if(!host) return;
  const pop=document.createElement("div");
  pop.className=`task-popup ${task.type==="reminder"?"reminder":"todo"}`;
  const dueStr=task.dueTs? `Due: ${_fmtDue(task.dueTs)}` : "";
  pop.innerHTML=`
    <button class="tp-close">✕</button>
    <div class="tp-type">${task.type==="reminder"?"🔔 Reminder":"✅ Task"}</div>
    <div class="tp-title">${escapeHtml(task.title)}</div>
    ${task.note?`<div class="tp-body">${escapeHtml(task.note)}</div>`:""}
    <div class="tp-from">From: ${escapeHtml(task.fromName||"Admin")}${dueStr?" · "+dueStr:""}</div>
    <div class="tp-actions">
      <button class="tp-dismiss">Dismiss</button>
      <button class="tp-done">Mark Done</button>
    </div>`;
  host.appendChild(pop);

  const remove=()=>{ pop.style.opacity="0"; pop.style.transform="translateX(20px)"; pop.style.transition=".2s"; setTimeout(()=>pop.remove(),220); };
  pop.querySelector(".tp-close").onclick=remove;
  pop.querySelector(".tp-dismiss").onclick=remove;
  pop.querySelector(".tp-done").onclick=()=>{
    initTasks();
    const myId = STATE.role==="student"? STATE.sid : STATE.role==="teacher"? STATE.tid : null;
    const t=DB.tasks.find(x=>x.id===task.id);
    if(t&&myId){ setTaskDoneFor(t, myId, true); saveDB(); }
    remove();
    // refresh tasks panel if open
    if(STATE.role==="student"&&STATE.studentPanel==="tasks") showStudentPanel("tasks");
    if(STATE.role==="teacher"&&STATE.teacherPanel==="tasks") showTeacherPanel("tasks");
    toast("✅ Task marked done!");
  };
  // auto-dismiss after 30s
  setTimeout(remove, 30000);
}

function _fmtDue(ts){
  if(!ts) return "";
  const d=new Date(parseInt(ts));
  return d.toLocaleDateString()+", "+d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}
function _fmtDate(ts){
  if(!ts) return "—";
  return new Date(parseInt(ts)).toLocaleDateString();
}

/* ── Create task dialog (shared by admin & teacher) ─────────────── */
function dlgCreateTask(creatorRole, creatorId, creatorName){

  const teacherOpts=allTeachers.map(t=>`<option value="${escapeHtml(t.id)}">${escapeHtml(t.name)} (${escapeHtml(t.id)})</option>`).join("");
  const studentOpts=allStudents.map(s=>`<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)} (${escapeHtml(s.id)})</option>`).join("");

  const body=openModal("Create Task / Reminder",`
    <div class="field">

      <select id="ctType">
        <option value="todo">✅ To-Do Task</option>
        <option value="reminder">🔔 Reminder</option>
      </select>
